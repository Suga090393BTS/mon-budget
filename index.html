<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f766e">
<title>Mon budget</title>
<!-- PWA : installable comme une appli -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root{
  --bg:#f4f6f8; --surface:#ffffff; --surface-2:#f0f3f5; --line:#e2e8f0;
  --text:#0f172a; --muted:#64748b; --accent:#0f766e; --accent-soft:#ccfbf1;
  --pos:#059669; --neg:#dc2626; --warn:#d97706; --info:#2563eb;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.06);
  --radius:18px; --radius-sm:12px;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#0b1220; --surface:#131c2e; --surface-2:#1c2840; --line:#28344d;
    --text:#e8edf6; --muted:#94a3b8; --accent:#2dd4bf; --accent-soft:#0f3b36;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 30px rgba(0,0,0,.35); }
}
/* Forçage manuel jour/nuit (prioritaire sur le réglage système) */
html[data-theme="light"]{ --bg:#f4f6f8; --surface:#ffffff; --surface-2:#f0f3f5; --line:#e2e8f0;
  --text:#0f172a; --muted:#64748b; --accent:#0f766e; --accent-soft:#ccfbf1;
  --pos:#059669; --neg:#dc2626; --warn:#d97706; --info:#2563eb;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.06); }
html[data-theme="dark"]{ --bg:#0b1220; --surface:#131c2e; --surface-2:#1c2840; --line:#28344d;
  --text:#e8edf6; --muted:#94a3b8; --accent:#2dd4bf; --accent-soft:#0f3b36;
  --pos:#10b981; --neg:#f87171; --warn:#fbbf24; --info:#60a5fa;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 30px rgba(0,0,0,.35); }
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.45;}
.app{max-width:1180px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,var(--accent),#0e6b8a);
  color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;}
.topbar h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.2px}
.topbar .sub{font-size:11.5px;opacity:.9;font-weight:500}
.topbar .spacer{flex:1}
.iconbtn{background:rgba(255,255,255,.16);border:none;color:#fff;width:38px;height:38px;border-radius:11px;
  font-size:17px;cursor:pointer;display:grid;place-items:center;transition:.15s}
.iconbtn:active{transform:scale(.92)}
.shell{display:flex;flex:1;min-height:0}
.sidenav{display:none}
@media(min-width:880px){
  .sidenav{display:flex;flex-direction:column;gap:4px;width:212px;padding:18px 12px;flex-shrink:0}
  .sidenav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;
    color:var(--muted);font-size:14.5px;font-weight:600;padding:11px 14px;border-radius:12px;cursor:pointer;transition:.15s}
  .sidenav button .ic{font-size:18px}
  .sidenav button.active{background:var(--accent-soft);color:var(--accent)}
  .sidenav button:hover{background:var(--surface-2)}
}
.main{flex:1;min-width:0;padding:18px 16px 110px}
@media(min-width:880px){ .main{padding:22px 26px 40px} }
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--surface);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:7px 2px 9px;
  backdrop-filter:saturate(180%) blur(8px)}
.bottomnav button{background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex:1;padding:3px 1px}
.bottomnav button .ic{font-size:19px}
.bottomnav button.active{color:var(--accent)}
@media(min-width:880px){ .bottomnav{display:none} }
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.card h2{margin:0 0 14px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card h2 .tag{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-soft);
  padding:3px 8px;border-radius:20px;letter-spacing:.3px}
.grid{display:grid;gap:13px}
.accts{grid-template-columns:repeat(2,1fr)}
@media(min-width:680px){.accts{grid-template-columns:repeat(3,1fr)}}
.acct{border-radius:15px;padding:14px;background:var(--surface-2);position:relative;overflow:hidden}
.acct.off{opacity:.55}
.acct .nm{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
.acct .bal{font-size:19px;font-weight:800;margin-top:7px;letter-spacing:-.4px}
.acct .tagm{font-size:10.5px;color:var(--muted);margin-top:2px}
.hero{background:linear-gradient(135deg,var(--accent),#0e6b8a);color:#fff;border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.hero .l{font-size:12px;opacity:.85;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.hero .v{font-size:30px;font-weight:800;margin-top:4px;letter-spacing:-1px}
.hero .x{font-size:12.5px;opacity:.9;margin-top:4px}
.kpis{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--surface-2);border-radius:14px;padding:13px}
.kpi .lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.kpi .val{font-size:19px;font-weight:800;margin-top:5px;letter-spacing:-.5px}
.pos{color:var(--pos)} .neg{color:var(--neg)} .warn{color:var(--warn)} .muted{color:var(--muted)}
.monthbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.monthbar select{font:inherit;padding:9px 12px;border-radius:11px;border:1px solid var(--line);background:var(--surface);color:var(--text)}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;font:inherit;padding:12px 13px;border-radius:12px;
  border:1px solid var(--line);background:var(--surface);color:var(--text)}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.seg{display:flex;background:var(--surface-2);border-radius:12px;padding:4px;gap:4px;margin-bottom:15px}
.seg button{flex:1;border:none;background:none;padding:10px 6px;border-radius:9px;font:inherit;font-weight:700;
  color:var(--muted);cursor:pointer;transition:.15s;font-size:13.5px}
.seg button.on-dep{background:var(--neg);color:#fff}
.seg button.on-ent{background:var(--pos);color:#fff}
.seg button.on-tr{background:var(--info);color:#fff}
.btn{width:100%;border:none;background:var(--accent);color:#fff;font:inherit;font-weight:700;font-size:16px;
  padding:14px;border-radius:14px;cursor:pointer;transition:.15s;margin-top:4px}
.btn:active{transform:scale(.99)} .btn.ghost{background:var(--surface-2);color:var(--text)}
.btn.sm{width:auto;padding:9px 15px;font-size:13.5px;border-radius:11px;margin:0}
.btn.danger{background:var(--neg)}
.sugg{background:var(--accent-soft);border-radius:12px;padding:11px 13px;margin-bottom:13px;display:none;align-items:center;gap:10px;font-size:13px}
.sugg.show{display:flex}
.sugg b{color:var(--accent)}
.sugg .apply{margin-left:auto;background:var(--accent);color:#fff;border:none;padding:7px 12px;border-radius:9px;font-weight:700;cursor:pointer;font-size:12.5px}
.libwrap{position:relative}
.libdrop{position:absolute;top:100%;left:0;right:0;z-index:30;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 26px rgba(0,0,0,.18);max-height:250px;overflow:auto;display:none;margin-top:4px}
.libdrop.show{display:block}
.libdrop .it{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;font-size:13.5px;border-bottom:1px solid var(--line)}
.libdrop .it:last-child{border-bottom:none}
.libdrop .it:active,.libdrop .it:hover{background:var(--accent-soft)}
.libdrop .it .c{margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:45%}
.txlist{display:flex;flex-direction:column;gap:2px}
.tx{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
.tx:last-child{border-bottom:none}
.tx .ava{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:grid;place-items:center;font-size:17px;background:var(--surface-2)}
.tx .info{flex:1;min-width:0}
.tx .t1{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx .t2{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx .amt{font-weight:800;font-size:14.5px;white-space:nowrap}
.tx .del{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px 5px;opacity:.6}
.tx .del:hover{opacity:1}
.rank{display:flex;flex-direction:column;gap:11px}
.rb .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.rb .track{height:10px;background:var(--surface-2);border-radius:6px;overflow:hidden}
.rb .fill{height:100%;border-radius:6px}
.bbar{margin-bottom:14px}
.bbar .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.bbar .track{height:9px;background:var(--surface-2);border-radius:6px;overflow:hidden}
.bbar .fill{height:100%;border-radius:6px;transition:width .5s}
.insight{display:flex;gap:12px;padding:13px;border-radius:13px;background:var(--surface-2);margin-bottom:11px}
.insight .em{font-size:20px;flex-shrink:0}
.insight .it{font-size:13.5px}
.narr{font-size:15px;line-height:1.65}
.narr .hl{font-weight:800;color:var(--accent)}
.empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:13.5px}
.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.chip.prevu{background:var(--accent-soft);color:var(--accent)}
.chip.paye{background:#dcfce7;color:#166534}
.chip.annule{background:var(--surface-2);color:var(--muted);text-decoration:line-through}
.chip.retard{background:#fee2e2;color:#991b1b}
@media(prefers-color-scheme:dark){.chip.paye{background:#0f3b2a;color:#86efac}.chip.retard{background:#3b1212;color:#fca5a5}}
.fitem{display:flex;align-items:center;gap:11px;padding:12px 4px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.fitem:last-child{border-bottom:none}
.fitem .fi{flex:1;min-width:140px}
.fitem .ft1{font-weight:700;font-size:14px}
.fitem .ft2{font-size:11.5px;color:var(--muted)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);
  color:var(--bg);padding:12px 20px;border-radius:30px;font-weight:600;font-size:13.5px;z-index:100;opacity:0;
  transition:.3s;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:880px){.toast{bottom:30px}}
.pagehead{font-size:20px;font-weight:800;margin:2px 0 16px;letter-spacing:-.4px}
.setrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.setrow:last-child{border-bottom:none}
.setrow .si{flex:1;min-width:130px}
.setrow input.mini{width:110px}
.setrow input.emoji{width:54px;text-align:center}
.switch{position:relative;width:44px;height:26px;flex-shrink:0}
.switch input{display:none}
.switch .sl{position:absolute;inset:0;background:var(--surface-2);border:1px solid var(--line);border-radius:20px;cursor:pointer;transition:.2s}
.switch .sl:before{content:"";position:absolute;width:20px;height:20px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
.switch input:checked + .sl{background:var(--accent);border-color:var(--accent)}
.switch input:checked + .sl:before{transform:translateX(18px)}
.sectit{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:4px 0 10px}
.hide{display:none!important}
.chartwrap{width:100%;overflow:visible}
#authOverlay{position:fixed;inset:0;z-index:200;background:linear-gradient(150deg,var(--accent),#0e6b8a);
  display:none;align-items:center;justify-content:center;padding:22px}
#authOverlay.show{display:flex}
.authcard{background:var(--surface);border-radius:22px;box-shadow:var(--shadow);padding:26px 22px;width:100%;max-width:380px;text-align:center}
.authcard .authlogo{font-size:42px}
.authcard h2{margin:6px 0 4px;font-size:21px;font-weight:800}
.authcard p{margin:0 0 14px}
.authcard .field{text-align:left;margin-top:10px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
</head>

<div id="authOverlay"></div>
<div class="app">
  <div class="topbar">
    <div>
      <h1>💰 Mon budget</h1>
      <div class="sub" id="topSub">Chargement…</div>

    <div class="spacer"></div>
    <button class="iconbtn" id="btnTheme" title="Jour / Nuit" onclick="toggleTheme()">🌙</button>

    <nav class="sidenav" id="sidenav"></nav>
    <main class="main" id="main"></main>

</div>
<div class="toast" id="toast"></div>

let DB=null; /* rempli par load() — laisser null pour déclencher le seed au 1er lancement */
let UI={tab:"dash", type:"dep", month:"all", edit:null};
let MEM={};
const STORE={
  get(k){ try{return localStorage.getItem(k);}catch(e){return (k in MEM)?MEM[k]:null;} },
  set(k,v){ try{localStorage.setItem(k,v);}catch(e){MEM[k]=v;} }
};
function seedTx(){
  return APPDATA.transactions.map((t,i)=>({
    id:"seed"+i, date:toISO(t.date), montant:t.montant, moyen:t.moyen,
    categorie:t.categorie||"", sousCategorie:t.sousCategorie||"", note:t.note||"", periode:t.periode||"", compte:""
  }));
}
function ensureDefaults(){
  if(!DB||typeof DB!=="object") DB={};
  if(!Array.isArray(DB.transactions)) DB.transactions=seedTx();
  if(!Array.isArray(DB.accounts)||!DB.accounts.length) DB.accounts=defaultAccounts();
  if(!Array.isArray(DB.categories)||!DB.categories.length) DB.categories=defaultCategories();
  if(!Array.isArray(DB.future)) DB.future=[];
  if(!Array.isArray(DB.cashCounts)) DB.cashCounts=[];
  if(!Array.isArray(DB.horaires)) DB.horaires=[];
  if(!Array.isArray(DB.vacances)) DB.vacances=[];
  if(!Array.isArray(DB.objectifs)) DB.objectifs=[];
  if(!Array.isArray(DB.libelles)) DB.libelles=[];
  if(!DB.trained||typeof DB.trained!=="object") DB.trained={};
  if(!DB.paye||typeof DB.paye!=="object") DB.paye={montant:0,lines:[]};
  if(!Array.isArray(DB.paye.lines)) DB.paye.lines=[];
  /* migration : anciennes lignes libres {nom,dest} → lignes par catégorie / compte */
  DB.paye.lines.forEach(l=>{ if(l.cat===undefined&&l.acct===undefined){ l.acct=(l.dest&&l.dest!=="cc")?l.dest:""; l.cat=""; l.sub=l.sub||""; delete l.dest; delete l.nom; } });
  /* migration : fusion découpe/enveloppes — les lignes par catégorie deviennent des plafonds, on ne garde que l'épargne */
  if(DB.paye.lines.some(l=>l.cat)){
    const per={}; DB.paye.lines.forEach(l=>{ if(l.cat) per[l.cat]=(per[l.cat]||0)+payeAmt(l); });
    DB.categories.forEach(c=>{ if(per[c.name]>0&&!(c.budget>0)) c.budget=Math.round(per[c.name]*100)/100; });
    DB.paye.lines=DB.paye.lines.filter(l=>l.acct);
  }
  if(DB.contratHebdo==null) DB.contratHebdo=42;
  DB.categories.forEach(c=>{ if(typeof c.besoin!=="boolean") c.besoin = BESOIN_DEFAUT[c.name]!==undefined?BESOIN_DEFAUT[c.name]:true; });
  if(!Array.isArray(DB.cryptoTrack)){ DB.cryptoTrack=[{id:"sb",nom:"Swissborg",history:[]},{id:"av",nom:"Assurance vie",history:[]}]; DB.avSeeded=true; }
  else if(!DB.avSeeded){ if(!DB.cryptoTrack.some(p=>p.id==="av")) DB.cryptoTrack.push({id:"av",nom:"Assurance vie",history:[]}); DB.avSeeded=true; }
}
function loadLocal(){
  let raw=null; try{raw=STORE.get("monbudget4");}catch(e){raw=null;}
  if(raw){ try{DB=JSON.parse(raw);}catch(e){DB=null;} }
  ensureDefaults(); saveLocal();
}
function load(){ loadLocal(); }
function saveLocal(){ STORE.set("monbudget4", JSON.stringify(DB)); }

/* ---------- Utilitaires ---------- */
function toISO(d){ if(!d) return ""; if(d.includes("-")&&d.length===10) return d;
  const p=d.split("/"); if(p.length!==3) return ""; return p[2]+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0"); }
function frDate(iso){ if(!iso) return ""; const p=iso.split("-"); return p.length===3? p[2]+"/"+p[1]+"/"+p[0] : iso; }
function monthOf(iso){ return iso&&iso.includes("-")? parseInt(iso.split("-")[1],10)-1 : null; }
function eur(n){ return (Math.round(n*100)/100).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" €"; }
function eur0(n){ return eur(n); } /* centimes exacts partout — aucun arrondi d'affichage */
function uid(){ return "t"+Date.now()+Math.random().toString(36).slice(2,6); }
function todayISO(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function txOfMonth(m){ return DB.transactions.filter(t=> m==="all"?true: monthOf(t.date)===m ); }
function acct(id){ return DB.accounts.find(a=>a.id===id); }
function acctName(id){ const a=acct(id); return a?a.emoji+" "+a.name:id; }
function activeCats(){ return DB.categories.filter(c=>c.active); }
function catObj(name){ return DB.categories.find(c=>c.name===name); }
function subsOf(name){ const c=catObj(name); return c?c.subs:[]; }
function catEmoji(name){ const c=catObj(name); return c?c.emoji:(CAT_EMOJI[name]||"💸"); }
function subBudget(label){ const s=APPDATA.reference.sousCategories.find(x=>x.label.trim()===(label||"").trim()); return s?s.budget:0; }

function savingsAccountOf(t){ const cg=t.categorie, sc=(t.sousCategorie||"").toUpperCase();
  if(cg!=="INVESTISSEMENT") return "projets";
  if(sc.includes("PEA")||sc.includes("PLAN ÉPARGNE")||sc.includes("PLAN EPARGNE")) return "pea";
  if(sc.includes("CRYPTO")) return "crypto";
  if(sc.includes("PROJET")) return "projets";
  return "livretA"; }
function resolveAccount(t){
  if(t.compte && acct(t.compte)) return t.compte;
  const m=t.moyen, cg=t.categorie;
  if(m==="ESS") return "caisse";
  if(m==="ESD"||m==="ES"||m==="ESP") return "portefeuille";
  if(cg==="VERSEMENT ESPÈCES"||cg==="PROJET E") return "caisse";
  return "cc";
}
function isTransfer(t){ return t.type==="transfer" || isActivation(t) || isSavingsTransfer(t)
  || ["RETRAIT","VERSEMENT ESPÈCES","PROJET E","SECOURS"].includes(t.categorie) || t.moyen==="VI"; }
function isDepense(t){ return t.montant<0 && !isTransfer(t); }
function isRevenu(t){ return t.type!=="transfer" && t.montant>0 && !isActivation(t); }
function isLiquid(id){ const a=acct(id); return !!(a&&(a.type==="courant"||a.type==="cash")); }   /* compte courant, caisse, portefeuille */
function isSavings(id){ const a=acct(id); return !!(a&&(a.type==="epargne"||a.type==="invest"||a.type==="crypto")); } /* livret A, assurance vie, projets, PEA, crypto */
function flowOf(m){
  const tx=txOfMonth(m);
  const rev=tx.filter(isRevenu).reduce((a,t)=>a+t.montant,0);
  const dep=tx.filter(isDepense).reduce((a,t)=>a+Math.abs(t.montant),0);
  let epargne=0;
  tx.filter(t=>t.type==="transfer").forEach(t=>{ const v=Math.abs(t.montant);
    if(isLiquid(t.from)&&isSavings(t.to)) epargne+=v; else if(isSavings(t.from)&&isLiquid(t.to)) epargne-=v; });
  return {rev,dep,epargne,dispo:rev-dep-epargne};
}
/* ---------- Rapport : besoin (essentiel) vs envie + train de vie ---------- */
const BESOIN_DEFAUT={
  "Courses & Alimentation":true,"Chien (Hatchi)":true,"Ferme & Volailles":true,"Transport":true,
  "Santé":true,"Abonnements":true,"Maison & Tech":true,"Divers & Remboursements":true,
  "Sorties & Restaurants":false,"Beauté & Mode":false,"Loisirs & Passions":false,"Cadeaux & Fêtes":false
};
function catBesoin(name){ const c=(DB.categories||[]).find(x=>x.name===name); if(c&&typeof c.besoin==="boolean")return c.besoin;
  return BESOIN_DEFAUT[name]!==undefined?BESOIN_DEFAUT[name]:true; }
/* essentiel ou non, au niveau de la sous-catégorie si précisé, sinon au niveau de la catégorie */
function besoinOf(catName, sub){ const c=(DB.categories||[]).find(x=>x.name===catName);
  if(c&&sub&&c.subsBesoin&&typeof c.subsBesoin[sub]==="boolean") return c.subsBesoin[sub];
  return catBesoin(catName); }
function setSubBesoin(i, sub, v){ const c=DB.categories[i]; if(!c)return; if(!c.subsBesoin)c.subsBesoin={}; c.subsBesoin[sub]=!!v; save(); render(); }
function depByBesoin(m){ let besoin=0,envie=0; const byCatB={},byCatE={};
  txOfMonth(m).filter(isDepense).forEach(t=>{ const v=Math.abs(t.montant),c=t.categorie||"Autres",sub=t.sousCategorie||"";
    const label = sub?c+" / "+sub : c;
    if(besoinOf(c,sub)){besoin+=v;byCatB[label]=(byCatB[label]||0)+v;} else {envie+=v;byCatE[label]=(byCatE[label]||0)+v;} });
  return {besoin,envie,total:besoin+envie,byCatB,byCatE}; }
function monthsWithDep(){ const s=new Set(); DB.transactions.forEach(t=>{ if(isDepense(t)){const mo=monthOf(t.date); if(mo!=null)s.add(mo);} }); return [...s]; }
function avgMensuel(){ const ms=monthsWithDep(); if(!ms.length)return{besoin:0,envie:0,total:0,n:0};
  let b=0,e=0; ms.forEach(m=>{const d=depByBesoin(m);b+=d.besoin;e+=d.envie;}); const n=ms.length; return{besoin:b/n,envie:e/n,total:(b+e)/n,n}; }
function avgRevenu(){ const by={}; DB.transactions.filter(isRevenu).forEach(t=>{const mo=monthOf(t.date); if(mo!=null)by[mo]=(by[mo]||0)+t.montant;});
  const ks=Object.keys(by); return ks.length?ks.reduce((a,k)=>a+by[k],0)/ks.length:0; }
function chargesFixes(){ const seen={}; let dep=0,epargne=0; const items=[];
  (DB.future||[]).forEach(f=>{ const key=f.serieId||f.id; if(seen[key])return; const fr=f.freq||"ponctuel"; if(fr==="ponctuel"||f.statut==="annulé")return; seen[key]=1;
    const div=fr==="annuel"?12:fr==="trimestriel"?3:1; const v=Math.abs(f.montant)/div;
    if(f.type==="transfer"){ if(isSavings(f.to)){epargne+=v;items.push({nom:f.nom,v,kind:"epargne",fr});} else {dep+=v;items.push({nom:f.nom,v,kind:"charge",fr});} }
    else if(f.montant<0){ dep+=v; items.push({nom:f.nom,v,kind:"charge",fr}); } });
  return {dep,epargne,items}; }
function computeBalances(){
  const bal={}; DB.accounts.forEach(a=>bal[a.id]=a.opening||0);
  let cryptoInv=0, peaInv=0; const inv={}; /* inv = net transféré (montant investi) par compte */
  DB.transactions.forEach(t=>{
    if(t.type==="transfer"){ const v=Math.abs(t.montant);
      if(t.from in bal) bal[t.from]-=v; if(t.to in bal) bal[t.to]+=v;
      inv[t.to]=(inv[t.to]||0)+v; inv[t.from]=(inv[t.from]||0)-v;
      if(t.to==="crypto") cryptoInv+=v; if(t.from==="crypto") cryptoInv-=v;
      if(t.to==="pea") peaInv+=v; if(t.from==="pea") peaInv-=v; return; }
    if(isActivation(t)) return;
    if(isSavingsTransfer(t)){ const sav=savingsAccountOf(t);
      if("cc" in bal) bal.cc+=t.montant; if(sav in bal) bal[sav]-=t.montant;
      inv[sav]=(inv[sav]||0)-t.montant;
      if(t.montant<0){ if(sav==="crypto") cryptoInv+=Math.abs(t.montant); if(sav==="pea") peaInv+=Math.abs(t.montant); } return; }
    const a=resolveAccount(t); if(a in bal) bal[a]+=t.montant;
  });
  bal._cryptoInv=cryptoInv; bal._peaInv=peaInv; bal._inv=inv; return bal;
}

const Vigie = {
  scan(m){
    const out=[]; const refMonth = m==="all"? new Date().getMonth() : m;
    const tx=txOfMonth(refMonth);
    const spent={}; tx.filter(t=>isDepense(t)&&t.sousCategorie).forEach(t=>{ spent[t.sousCategorie]=(spent[t.sousCategorie]||0)+Math.abs(t.montant); });
    const over=[],risk=[];
    Object.keys(spent).forEach(sc=>{ const b=subBudget(sc); if(b>0){ const r=spent[sc]/b; if(r>1)over.push([sc,spent[sc],b,r]); else if(r>=.8)risk.push([sc,spent[sc],b,r]); }});
    over.sort((a,b)=>b[3]-a[3]); risk.sort((a,b)=>b[3]-a[3]);
    over.slice(0,5).forEach(o=>out.push({em:"🚨",txt:`Budget <b>${o[0]}</b> dépassé : ${eur(o[1])} pour ${eur(o[2])} prévus (<b class="neg">+${Math.round((o[3]-1)*100)}%</b>).`}));
    risk.slice(0,4).forEach(o=>out.push({em:"⚠️",txt:`Budget <b>${o[0]}</b> bientôt atteint : ${eur(o[1])} / ${eur(o[2])} (${Math.round(o[3]*100)}%).`}));
    const deps=tx.filter(isDepense).map(t=>Math.abs(t.montant));
    if(deps.length>3){ const avg=deps.reduce((a,b)=>a+b,0)/deps.length;
      tx.filter(t=>isDepense(t)&&Math.abs(t.montant)>avg*3&&Math.abs(t.montant)>50).sort((a,b)=>a.montant-b.montant).slice(0,3)
        .forEach(t=>out.push({em:"🔍",txt:`Dépense inhabituelle : <b>${eur(Math.abs(t.montant))}</b> — ${t.note||t.sousCategorie||t.categorie} (${frDate(t.date)}), soit ${(Math.abs(t.montant)/avg).toFixed(1)}× ta moyenne.`}));
    }
    const up=upcoming(7); if(up.length) out.push({em:"📅",txt:`<b>${up.length}</b> paiement(s) prévu(s) dans les 7 prochains jours, pour <b>${eur0(up.reduce((a,f)=>a+Math.abs(f.montant),0))}</b>.`});
    if(!out.length) out.push({em:"✅",txt:`Tout est sous contrôle pour <b>${MONTHS[refMonth]}</b>.`});
    return out;
  }
};
const Narrateur = {
  tell(m){
    const refMonth = m==="all"? new Date().getMonth() : m;
    const tx=txOfMonth(refMonth); const dep=tx.filter(isDepense); const fl=flowOf(refMonth);
    if(!tx.length) return `Aucune écriture pour <span class="hl">${MONTHS[refMonth]}</span>. Ajoute ta première opération depuis l'onglet Saisie !`;
    const byCat={}; dep.forEach(t=>{const c=t.categorie||"Autres";byCat[c]=(byCat[c]||0)+Math.abs(t.montant);});
    const top=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,3);
    let s=`En <span class="hl">${MONTHS[refMonth]}</span>, tu as dépensé <span class="hl">${eur(fl.dep)}</span> sur <b>${dep.length}</b> opérations`;
    s+= fl.rev>0? ` pour <span class="hl">${eur(fl.rev)}</span> de revenus. `:`. `;
    if(fl.epargne>0) s+=`Tu as mis <span class="hl">${eur(fl.epargne)}</span> de côté (épargne/placements). `;
    if(fl.rev>0){ s+= fl.dispo>=0?`Au final, il te reste <b class="pos">${eur(fl.dispo)}</b> sur tes comptes du quotidien 👏. `:`Au final, tu es <b class="neg">en négatif de ${eur(-fl.dispo)}</b> sur tes comptes du quotidien. `; }
    if(top.length){ s+=`Ton plus gros poste : <span class="hl">${top[0][0]}</span> (${eur(top[0][1])}`; if(top[1])s+=`, puis ${top[1][0]}`; s+=`). `; }
    const big=dep.slice().sort((a,b)=>a.montant-b.montant)[0];
    if(big) s+=`Plus grosse sortie : <b>${eur(Math.abs(big.montant))}</b> (${big.note||big.sousCategorie}).`;
    return s;
  }
};
const Devin = {
  forecast(m){
    const now=new Date(); const refMonth=m==="all"?now.getMonth():m; const year=2026;
    const dim=new Date(year,refMonth+1,0).getDate();
    const tx=txOfMonth(refMonth).filter(isDepense); const spent=tx.reduce((a,t)=>a+Math.abs(t.montant),0);
    let elapsed=(refMonth===now.getMonth()&&now.getFullYear()===year)?now.getDate():dim; elapsed=Math.max(elapsed,1);
    const projMonth=spent/elapsed*dim;
    const totalBudget=APPDATA.reference.sousCategories.filter(s=>s.types.includes("DpE")||s.types.includes("DpI")||s.types.includes("EpC")).reduce((a,s)=>a+s.budget,0);
    const allDep=DB.transactions.filter(isDepense); const totYear=allDep.reduce((a,t)=>a+Math.abs(t.montant),0);
    const monthsElapsed=now.getFullYear()===year?(now.getMonth()+now.getDate()/dim):12;
    const projYear=monthsElapsed>0?totYear/monthsElapsed*12:totYear;
    return {refMonth,dim,elapsed,spent,projMonth,totalBudget,totYear,projYear,monthsElapsed};
  }
};

function futureLine(f,isOverdue){
  const isTr=f.type==="transfer", dep=f.montant<0;
  const sub=isTr?`${acctName(f.from)} → ${acctName(f.to)}`:`${f.categorie||''} · ${acctName(f.compte)}`;
  return `<div class="insight" style="align-items:center"><div class="em">${isOverdue?'⏰':'📌'}</div>
    <div class="it" style="flex:1"><b>${f.nom}</b> · ${frDate(f.date)} ${isOverdue?'<span class="chip retard">en retard</span>':''}
      <div class="muted" style="font-size:11.5px">${sub}</div></div>
    <div class="amt ${isTr?'':(dep?'neg':'pos')}" style="font-weight:800">${isTr?'⇄ ':(dep?'':'+')}${eur(f.montant)}</div></div>`;
}
function catRanking(period){
  const tx=txOfMonth(period).filter(isDepense);
  const by={}; tx.forEach(t=>{const c=t.categorie||"Autres"; by[c]=(by[c]||0)+Math.abs(t.montant);});
  const rows=Object.entries(by).sort((a,b)=>b[1]-a[1]); if(!rows.length) return `<div class="empty">Aucune dépense sur cette période.</div>`;
  const max=rows[0][1], total=rows.reduce((a,r)=>a+r[1],0);
  return `<div class="rank">`+rows.map((r,i)=>`<div class="rb">
    <div class="top"><span>${catEmoji(r[0])} <b>${r[0]}</b></span><span><b>${eur0(r[1])}</b> <span class="muted">(${Math.round(r[1]/total*100)}%)</span></span></div>
    <div class="track"><div class="fill" style="width:${Math.max(r[1]/max*100,2)}%;background:${PALETTE[i%PALETTE.length]}"></div></div>
  </div>`).join("")+`</div>`;
}
function transferRanking(period){
  const tx=txOfMonth(period); const net={};
  tx.forEach(t=>{
    if(t.type==="transfer"){ const v=Math.abs(t.montant);
      if(t.to) net[t.to]=(net[t.to]||0)+v; if(t.from) net[t.from]=(net[t.from]||0)-v; }
    else if(isSavingsTransfer(t)){ const sav=savingsAccountOf(t);
      net[sav]=(net[sav]||0)+(-t.montant); net.cc=(net.cc||0)+t.montant; }
  });
  const rows=Object.entries(net).filter(r=>Math.abs(r[1])>=0.005).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]));
  if(!rows.length) return `<div class="empty">Aucun transfert sur cette période.</div>`;
  const max=Math.max(...rows.map(r=>Math.abs(r[1])));
  return `<div class="rank">`+rows.map(r=>{ const a=acct(r[0]); const name=a?a.name:r[0], emo=a?a.emoji:'⇄', v=r[1], pos=v>=0;
    return `<div class="rb">
    <div class="top"><span>${emo} <b>${name}</b></span><span><b style="color:${pos?'var(--pos)':'var(--neg)'}">${pos?'+':'−'}${eur0(Math.abs(v))}</b></span></div>
    <div class="track"><div class="fill" style="width:${Math.max(Math.abs(v)/max*100,2)}%;background:${pos?'var(--accent)':'var(--neg)'}"></div></div>
  </div>`;}).join("")+`</div>`;
}
function drawBars(id){
  const el=document.getElementById(id); if(!el) return;
  const mt=Array(12).fill(0);
  DB.transactions.filter(isDepense).forEach(t=>{const mo=monthOf(t.date); if(mo!=null)mt[mo]+=Math.abs(t.montant);});
  const max=Math.max(...mt,1), W=Math.max(560,12*46),H=180,base=150,gap=46,bw=26;
  let bars="";
  mt.forEach((v,i)=>{const h=v/max*120,x=20+i*gap,cur=(UI.month===i);
    bars+=`<rect x="${x}" y="${base-h}" width="${bw}" height="${h}" rx="5" fill="${cur?'var(--accent)':'var(--accent-soft)'}"></rect>
      <text x="${x+bw/2}" y="${base+16}" text-anchor="middle" font-size="11" fill="var(--muted)">${MONTHS_SHORT[i]}</text>
      ${v>0?`<text x="${x+bw/2}" y="${base-h-6}" text-anchor="middle" font-size="9" fill="var(--muted)">${(Math.round(v*100)/100).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})}</text>`:""}`;});
  el.innerHTML=`<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:${W}px">${bars}</svg></div>`;
}
function drawNet(id){
  const el=document.getElementById(id); if(!el) return;
  const vals=[]; for(let m=0;m<12;m++) vals.push(flowOf(m).dispo);
  const maxAbs=Math.max(1,...vals.map(v=>Math.abs(v)));
  const W=Math.max(560,12*46),H=200,mid=110,gap=46,bw=26,scale=80;
  let bars=`<line x1="12" y1="${mid}" x2="${W-12}" y2="${mid}" stroke="var(--line)"></line>`;
  vals.forEach((v,i)=>{const h=Math.abs(v)/maxAbs*scale,x=20+i*gap,pos=v>=0,y=pos?mid-h:mid;
    bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${h||0.5}" rx="4" fill="${pos?'var(--pos)':'var(--neg)'}"></rect>
      <text x="${x+bw/2}" y="${H-12}" text-anchor="middle" font-size="11" fill="var(--muted)">${MONTHS_SHORT[i]}</text>
      ${Math.abs(v)>=1?`<text x="${x+bw/2}" y="${pos?y-5:y+h+13}" text-anchor="middle" font-size="9" fill="var(--muted)">${Math.round(v)}</text>`:""}`;});
  el.innerHTML=`<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:${W}px">${bars}</svg></div>`;
}

function escH(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }
/* tous les libellés connus : ma liste (⭐) + tout ce que j'ai déjà saisi (avec la catégorie utilisée) */
function libPool(){
  const map=new Map();
  (DB.libelles||[]).forEach(l=>{ const txt=(l.txt||"").trim(); if(txt) map.set(txt.toLowerCase(),{txt,cat:l.cat||"",sub:l.sub||"",n:0,star:true}); });
  DB.transactions.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(t=>{
    if(t.type==="transfer") return; const txt=(t.note||"").trim(); if(!txt) return; const k=txt.toLowerCase();
    const e=map.get(k);
    if(e){ e.n++; if(!e.star&&t.categorie){ e.cat=t.categorie; e.sub=t.sousCategorie||""; } }
    else map.set(k,{txt,cat:t.categorie||"",sub:t.sousCategorie||"",n:1,star:false});
  });
  return [...map.values()];
}
function bindSaisie(){
  const note=document.getElementById("fNote"); if(!note||UI.type==="tr") return;
  const drop=document.getElementById("libDrop");
  const runSugg=()=>{ const g=Categoriseur.guess(note.value); const box=document.getElementById("sugg"); if(!box)return;
    if(g&&catObj(g.cat)){ box.classList.add("show");
      box.innerHTML=`🤖 <span>Le Catégoriseur propose <b>${g.cat}${g.sub?" / "+g.sub:""}</b> <span class="muted">(${g.src})</span></span>
        <button class="apply" onclick="applySugg('${g.cat.replace(/'/g,"\\'")}','${(g.sub||'').replace(/'/g,"\\'")}')">Appliquer</button>`;
    } else box.classList.remove("show"); };
  const runStar=()=>{ const star=document.getElementById("libStar"); if(!star)return; const txt=note.value.trim();
    const known=(DB.libelles||[]).some(l=>(l.txt||"").toLowerCase()===txt.toLowerCase());
    star.innerHTML = (txt.length>=2&&!known)?`<button class="btn ghost sm" style="width:auto;margin:-4px 0 12px;padding:6px 11px" onclick="starLib()">⭐ Garder « ${escH(txt)} » dans ma liste de libellés</button>`:"";
  };
  const showDrop=()=>{ if(!drop)return; const q=note.value.trim().toLowerCase();
    let items=libPool().filter(p=>{const t=p.txt.toLowerCase(); return q?(t.includes(q)&&t!==q):true;});
    items.sort((a,b)=>(b.star-a.star)||(b.n-a.n)||a.txt.localeCompare(b.txt));
    items=items.slice(0,7);
    if(!items.length){ drop.classList.remove("show"); drop.innerHTML=""; return; }
    drop.innerHTML=items.map((p,i)=>`<div class="it" data-i="${i}">${p.star?"⭐ ":""}${escH(p.txt)}<span class="c">${p.cat?escH(p.cat)+(p.sub?" / "+escH(p.sub):""):""}${p.n>1?` · ${p.n}×`:""}</span></div>`).join("");
    drop.classList.add("show");
    drop.querySelectorAll(".it").forEach(el=>el.addEventListener("mousedown",ev=>{ ev.preventDefault();
      const p=items[+el.dataset.i]; note.value=p.txt;
      if(p.cat&&catObj(p.cat)) applySugg(p.cat,p.sub||"");
      drop.classList.remove("show"); runStar(); if(!p.cat) runSugg(); else { const box=document.getElementById("sugg"); if(box)box.classList.remove("show"); }
    }));
  };
  note.addEventListener("input",()=>{ runSugg(); runStar(); showDrop(); });
  note.addEventListener("focus",showDrop);
  note.addEventListener("blur",()=>setTimeout(()=>{ if(drop)drop.classList.remove("show"); },150));
  runSugg(); runStar();
}
function starLib(){
  const note=document.getElementById("fNote"); if(!note)return; const txt=note.value.trim(); if(!txt)return;
  if(!(DB.libelles||[]).some(l=>(l.txt||"").toLowerCase()===txt.toLowerCase())){
    const cat=(document.getElementById("fCat")||{}).value||"", sub=(document.getElementById("fSub")||{}).value||"";
    DB.libelles.push({txt,cat,sub}); save(); toast("⭐ « "+txt+" » ajouté à ta liste");

}
function applySugg(cat,sub){ const cs=document.getElementById("fCat"); if(cs){cs.value=cat; document.getElementById("fSub").innerHTML=subOptions(cat,sub);} }
function saveTx(){
  const mont=parseFloat((document.getElementById("fMontant").value||"").replace(",","."));
  if(!mont||mont<=0){ toast("Indique un montant 🙏"); return; }
  const date=document.getElementById("fDate").value;
  const eid=(UI.edit&&UI.edit.id)?UI.edit.id:null;
  if(UI.type==="tr"){
    const from=document.getElementById("fFrom").value, to=document.getElementById("fTo").value;
    if(from===to){ toast("Choisis deux comptes différents"); return; }
    const obj={id:eid||uid(),type:"transfer",date,montant:Math.abs(mont),from,to,note:document.getElementById("fNote").value.trim(),observation:(document.getElementById("fObs")?document.getElementById("fObs").value.trim():"")};
    commit(obj,eid); return;
  }
  const obj={ id:eid||uid(), date, montant:(UI.type==="dep"?-1:1)*Math.abs(mont),
    note:document.getElementById("fNote").value.trim(), categorie:document.getElementById("fCat").value,
    sousCategorie:document.getElementById("fSub").value, compte:document.getElementById("fCompte").value,
    moyen:document.getElementById("fMoyen").value, observation:(document.getElementById("fObs")?document.getElementById("fObs").value.trim():""), periode:(UI.edit&&UI.edit.periode)||"" };
  commit(obj,eid);
}
function isCashAcct(id){ const a=acct(id); return !!(a&&a.type==="cash"); }
function commit(obj,eid){
  if(eid){ const i=DB.transactions.findIndex(t=>t.id===eid); if(i>=0)DB.transactions[i]=obj; else DB.transactions.push(obj); toast("Modifié ✅"); }
  else { DB.transactions.push(obj); toast("Opération ajoutée ✅"); }
  /* apprentissage : ce libellé → cette catégorie (reproposé la prochaine fois) */
  if(obj.type!=="transfer"&&obj.note&&obj.categorie){ if(!DB.trained)DB.trained={}; DB.trained[obj.note.trim().toLowerCase()]=[obj.categorie,obj.sousCategorie||""]; }
  UI.edit=null; save();
  /* Après une opération espèces : ouvrir le recomptage du/des compte(s) concerné(s) */
  let cashAccts=[];
  if(!eid){ if(obj.type==="transfer") cashAccts=[obj.from,obj.to].filter(isCashAcct);
    else { const ra=resolveAccount(obj); if(isCashAcct(ra)) cashAccts=[ra]; } }
  if(cashAccts.length){ UI.recountQueue=cashAccts; UI.afterRecount="tx"; nextRecount(); }
  else go("tx");
}
function nextRecount(){ if(UI.recountQueue&&UI.recountQueue.length){ const id=UI.recountQueue.shift();
    toast("⚠️ Tu as touché à "+(acct(id)?acct(id).name:id)+" — recompte"); UI.compteAcc=id; UI.tab="compteur"; UI.recountActive=true; renderNav(); render(); window.scrollTo(0,0); }

function renderTxList(){
  let list=txOfMonth(UI.month).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  if(TXFILTER.q){const q=TXFILTER.q.toLowerCase(); list=list.filter(t=>((t.note||"")+" "+(t.categorie||"")+" "+(t.sousCategorie||"")+" "+(t.observation||"")).toLowerCase().includes(q));}
  if(TXFILTER.cat) list=list.filter(t=>t.categorie===TXFILTER.cat);
  if(TXFILTER.acct) list=list.filter(t=> t.type==="transfer" ? (t.from===TXFILTER.acct||t.to===TXFILTER.acct) : resolveAccount(t)===TXFILTER.acct);
  if(TXFILTER.type==="dep") list=list.filter(isDepense);
  else if(TXFILTER.type==="ent") list=list.filter(isRevenu);
  else if(TXFILTER.type==="tr") list=list.filter(t=>t.type==="transfer");
  const meta=document.getElementById("txMeta");
  if(meta){ const dep=list.filter(isDepense).reduce((a,t)=>a+Math.abs(t.montant),0); const ent=list.filter(isRevenu).reduce((a,t)=>a+t.montant,0);

/* ===================== À VENIR (paiements futurs) ===================== */
let FNEW={type:"dep"};
const FREQ_LBL={mensuel:"🔁 mensuel",trimestriel:"🔁 trimestriel",annuel:"🔁 annuel"};
function addInterval(iso,i,freq){ const p=(iso||todayISO()).split("-").map(Number); const d=new Date(p[0],p[1]-1,p[2]);
  if(freq==="mensuel") d.setMonth(d.getMonth()+i);
  else if(freq==="trimestriel") d.setMonth(d.getMonth()+i*3);
  else if(freq==="annuel") d.setFullYear(d.getFullYear()+i);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function viewAvenir(){
  const list=DB.future.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const today=todayISO();
  const items=list.length?list.map(f=>{
    const isTr=f.type==="transfer"; const dep=f.montant<0; const late=f.statut==="prévu"&&f.date<today;
    const fl=(FREQ_LBL[f.freq]||"")+(f.sansFin?" ∞":"");
    const amtCls=isTr?"":(dep?"neg":"pos"), amtPre=isTr?"⇄ ":(dep?"":"+");
    const ligne2=isTr?`${acctName(f.from)} → ${acctName(f.to)}`:`${f.categorie||'—'}${f.sousCategorie?' / '+f.sousCategorie:''} · ${acctName(f.compte)}`;
    return `<div class="fitem"><div class="em" style="font-size:20px">${f.statut==="payé"?"✅":f.statut==="annulé"?"🚫":late?"⏰":"📌"}</div>
      <div class="fi"><div class="ft1">${f.nom} <span class="amt ${amtCls}">${amtPre}${eur(f.montant)}</span></div>
        <div class="ft2">${frDate(f.date)} · ${ligne2}${fl?' · '+fl:''}</div></div>
      <span class="chip ${f.statut==='payé'?'paye':f.statut==='annulé'?'annule':late?'retard':'prevu'}">${late&&f.statut==='prévu'?'en retard':f.statut}</span>
      <div style="display:flex;gap:4px">
        ${f.statut==="prévu"?`<button class="del" title="Marquer payé" onclick="futurePay('${f.id}')">✅</button>
          <button class="del" title="Modifier le montant" onclick="futureEdit('${f.id}')">✏️</button>
          <button class="del" title="Annuler" onclick="futureCancel('${f.id}')">🚫</button>`:""}
        <button class="del" title="Supprimer" onclick="futureDelete('${f.id}')">🗑️</button></div></div>`;
  }).join(""):`<div class="empty">Aucun paiement prévu. Ajoute-en un ci-dessous 👇</div>`;
  const t=FNEW.type;
  return `<div class="pagehead">📅 Paiements à venir</div>
  <div class="card"><h2>➕ Prévoir un paiement</h2>
    <div class="seg"><button class="${t==='dep'?'on-dep':''}" onclick="FNEW.type='dep';render()">↓ Dépense</button>
      <button class="${t==='ent'?'on-ent':''}" onclick="FNEW.type='ent';render()">↑ Revenu</button>
      <button class="${t==='tr'?'on-tr':''}" onclick="FNEW.type='tr';render()">⇄ Transfert</button></div>
    <div class="row2"><div class="field"><label>Nom</label><input id="fuNom" placeholder="Ex : Assurance vie, Netflix, Loyer…"></div>
      <div class="field"><label>1ʳᵉ échéance (date)</label><input id="fuDate" type="date" value="${todayISO()}"></div></div>
    ${t==='tr'?`
      <div class="field"><label>Montant par échéance (€)</label><input id="fuMontant" type="number" inputmode="decimal" step="0.01" placeholder="0,00"></div>
      <div class="row2"><div class="field"><label>Du compte</label><select id="fuFrom">${acctOptions('cc')}</select></div>
        <div class="field"><label>Vers le compte</label><select id="fuTo">${acctOptions('assurancevie')}</select></div></div>`
    :`
      <div class="row2"><div class="field"><label>Montant par échéance (€)</label><input id="fuMontant" type="number" inputmode="decimal" step="0.01" placeholder="0,00"></div>
        <div class="field"><label>Compte concerné</label><select id="fuCompte">${acctOptions('cc')}</select></div></div>
      <div class="row2"><div class="field"><label>Catégorie</label><select id="fuCat" onchange="document.getElementById('fuSub').innerHTML=subOptions(this.value,'')">${catOptions('')}</select></div>

    <div class="field"><label>Fréquence</label>
      <select id="fuFreq" onchange="document.getElementById('fuRecBlock').style.display=this.value==='ponctuel'?'none':'grid'">
        <option value="ponctuel">Ponctuel — une seule fois</option>
        <option value="mensuel">Mensuel</option>
        <option value="trimestriel">Trimestriel</option>
        <option value="annuel">Annuel</option>
      </select></div>
    <div id="fuRecBlock" class="row2" style="display:none">
      <div class="field"><label>Nombre d'échéances</label><input id="fuN" type="number" min="1" step="1" value="12"></div>
      <div class="field" style="display:flex;align-items:flex-end;padding-bottom:2px"><label style="display:flex;align-items:center;gap:8px;margin:0;cursor:pointer"><input type="checkbox" id="fuSansFin" style="width:auto"> ♾️ Sans fin (renouvelle tout seul)</label></div>
    </div>
    <div class="muted" style="font-size:11.5px;margin:-2px 0 12px">💡 <b>Paiement en plusieurs fois</b> : choisis « Mensuel », mets le montant d'<b>une</b> échéance et le nombre de fois (ex : 3). <b>Abonnement annuel sur 2 ans</b> : « Annuel », 2 échéances.</div>
    <button class="btn" onclick="addFuture()">✅ Ajouter</button></div>
  <div class="card"><h2>Mes paiements prévus</h2><div>${items}</div></div>`;

function addFuture(){
  const nom=document.getElementById("fuNom").value.trim();
  const mont=parseFloat((document.getElementById("fuMontant").value||"").replace(",","."));
  if(!nom){toast("Donne un nom au paiement");return;}
  if(!mont||mont<=0){toast("Indique un montant");return;}
  const date=document.getElementById("fuDate").value;
  const isTr=FNEW.type==="tr";
  let from="",to="",cat="",sousCat="",compte="";
  if(isTr){ from=document.getElementById("fuFrom").value; to=document.getElementById("fuTo").value;
    if(from===to){toast("Choisis deux comptes différents");return;} }
  else { cat=document.getElementById("fuCat").value; compte=document.getElementById("fuCompte").value;
    sousCat=document.getElementById("fuSub")?document.getElementById("fuSub").value:""; }
  const signed=isTr?Math.abs(mont):(FNEW.type==="dep"?-1:1)*Math.abs(mont);
  const freq=document.getElementById("fuFreq").value;
  const sansFin=freq!=="ponctuel" && document.getElementById("fuSansFin").checked;
  let n = freq==="ponctuel"?1: Math.max(1,parseInt(document.getElementById("fuN").value)||1);
  if(sansFin) n=12; /* horizon visible, prolongé automatiquement à chaque paiement */
  const serieId=uid();
  for(let i=0;i<n;i++){
    const label=(freq!=="ponctuel" && !sansFin && n>1)?`${nom} (${i+1}/${n})`:nom;
    const it={id:uid(),serieId,nom:label,date:addInterval(date,i,freq),montant:signed,statut:"prévu",freq,sansFin};
    if(isTr){ it.type="transfer"; it.from=from; it.to=to; } else { it.categorie=cat; it.sousCategorie=sousCat; it.compte=compte; }
    DB.future.push(it);
  }
  save(); toast(n>1?`${n} échéances ajoutées ✅`:"Paiement prévu ajouté ✅"); FNEW={type:"dep"}; render();
}
function futurePay(id){ const f=DB.future.find(x=>x.id===id); if(!f)return;
  f.statut="payé";
  if(f.sansFin && f.freq && f.freq!=="ponctuel"){
    const sib=DB.future.filter(x=>x.serieId===f.serieId).map(x=>x.date).sort();
    const nx={id:uid(),serieId:f.serieId,nom:f.nom,date:addInterval(sib[sib.length-1],1,f.freq),montant:f.montant,statut:"prévu",freq:f.freq,sansFin:true};
    if(f.type==="transfer"){ nx.type="transfer"; nx.from=f.from; nx.to=f.to; } else { nx.categorie=f.categorie; nx.sousCategorie=f.sousCategorie||""; nx.compte=f.compte; }
    DB.future.push(nx);
  }
  save();
  /* crée l'opération réelle et navigue vers Opérations (ou recomptage si compte espèces) */
  const obj = f.type==="transfer"
    ? {id:uid(),type:"transfer",date:f.date,montant:Math.abs(f.montant),from:f.from,to:f.to,note:f.nom}
    : {id:uid(),date:f.date,montant:f.montant,categorie:f.categorie,sousCategorie:f.sousCategorie||"",compte:f.compte,moyen:f.montant<0?"PL":"VIR",note:f.nom,observation:"",periode:""};
  commit(obj,null);
}
function futureEdit(id){ const f=DB.future.find(x=>x.id===id); if(!f)return;
  const v=prompt("Nouveau montant (€) pour « "+f.nom+" » :", String(Math.abs(f.montant)).replace(".",",")); if(v===null)return;
  const m=parseFloat(String(v).replace(",",".")); if(!m||m<=0){toast("Montant invalide");return;}
  f.montant=(f.montant<0?-1:1)*Math.abs(m); save(); render(); toast("Montant mis à jour ✅");
}
function futureCancel(id){ const f=DB.future.find(x=>x.id===id); if(f){f.statut="annulé"; save(); render();} }
function futureDelete(id){ if(!confirm("Supprimer ce paiement prévu ?"))return; DB.future=DB.future.filter(x=>x.id!==id); save(); render(); }

/* ===================== COMPTEUR DE CAISSE ===================== */
const DENOMS=[{v:500,l:"500 €"},{v:200,l:"200 €"},{v:100,l:"100 €"},{v:50,l:"50 €"},{v:20,l:"20 €"},{v:10,l:"10 €"},{v:5,l:"5 €"},{v:2,l:"2 €"},{v:1,l:"1 €"},{v:0.5,l:"50 c"},{v:0.2,l:"20 c"},{v:0.1,l:"10 c"},{v:0.05,l:"5 c"},{v:0.02,l:"2 c"},{v:0.01,l:"1 c"}];
const ROLLN={"0.01":50,"0.02":50,"0.05":50,"0.1":40,"0.2":40,"0.5":40,"1":25,"2":25,"5":100,"10":100,"20":100,"50":100,"100":100,"200":100,"500":100};
const INSTY="width:76px;font:inherit;padding:8px 10px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--text)";
function denomKey(v){ return "d"+String(v).replace(".","_"); }
function openCompteur(id){ const cash=DB.accounts.filter(a=>a.active&&a.type==="cash"); UI.compteAcc=id||(cash[0]&&cash[0].id)||"caisse"; UI.recountActive=false; UI.tab="compteur"; renderNav(); render(); window.scrollTo(0,0); }
function viewCompteur(){
  const cash=DB.accounts.filter(a=>a.active&&a.type==="cash");
  const a=acct(UI.compteAcc)||cash[0]; if(!a) return `<div class="pagehead">🧮 Compteur</div><div class="card"><div class="empty">Aucun compte espèces actif.</div></div>`;
  const stored=a.cash||{};
  const getPR=(k)=>{const s=stored[k]; if(s==null)return{p:"",r:""}; if(typeof s==="number")return{p:s,r:""}; return {p:s.p||"",r:s.r||""};};
  const expected=Math.round((computeBalances()[a.id]||0)*100)/100;
  const billets=DENOMS.filter(d=>d.v>=5), pieces=DENOMS.filter(d=>d.v<5);
  const allowPack = !(a.id==="portefeuille" || a.noPack); /* portefeuille = monnaie en vrac, sans liasses ni rouleaux */
  const row=(d)=>{const k=denomKey(d.v),pr=getPR(k),n=allowPack?(ROLLN[String(d.v)]||0):0,pv=Math.round(d.v*n*100)/100;
    const looseLbl=d.v>=5?"billets":"pièces", packLbl=d.v>=5?"liasses":"rouleaux";
    return `<div style="padding:9px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700">${d.l}</span><span class="muted" style="font-size:12.5px" id="st_${k}">—</span></div>
      <div style="display:flex;gap:16px;margin-top:6px;flex-wrap:wrap">
        <label style="font-size:11.5px;color:var(--muted)">${looseLbl}<br><input type="number" min="0" step="1" inputmode="numeric" data-key="${k}" data-kind="p" data-amt="${d.v}" value="${pr.p}" placeholder="0" oninput="recalcCaisse()" style="${INSTY}"></label>
        ${n?`<label style="font-size:11.5px;color:var(--muted)">${packLbl} <span style="opacity:.7">(×${eur(pv)})</span><br><input type="number" min="0" step="1" inputmode="numeric" data-key="${k}" data-kind="r" data-amt="${pv}" value="${pr.r}" placeholder="0" oninput="recalcCaisse()" style="${INSTY}"></label>`:""}
      </div></div>`;};
  const hist=(DB.cashCounts||[]).filter(c=>c.acct===a.id).slice().sort((x,y)=>y.date.localeCompare(x.date)).slice(0,12);
  const histHTML=hist.length?hist.map(c=>`<div style="display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--line)"><span class="muted">${frDate(c.date)}</span><span><b>${eur(c.total)}</b> · écart <span style="color:${Math.abs(c.ecart)<0.005?'var(--pos)':'var(--warn)'}">${c.ecart>0?'+':''}${eur(c.ecart)}</span></span></div>`).join(""):'<div class="muted" style="font-size:12.5px">Aucun comptage enregistré pour l\'instant.</div>';
  return `<div class="pagehead">💵 Espèces</div>
  ${UI.recountActive?`<div class="insight" style="background:var(--accent-soft);margin-bottom:14px"><div class="em">⚠️</div><div class="it">Tu as touché à <b>${a.name}</b> — recompte ce qu'il te reste réellement, puis « Caler ».</div></div>`:""}
  <div class="card"><div class="field" style="margin-bottom:4px"><label>Quel compte espèces ?</label>
    <select onchange="UI.compteAcc=this.value;render()">${cash.map(c=>`<option value="${c.id}" ${c.id===a.id?'selected':''}>${c.emoji} ${c.name}</option>`).join("")}</select></div></div>
  <div class="card"><h2>💶 Billets${allowPack?" & liasses":""}</h2>${billets.map(row).join("")}</div>
  <div class="card"><h2>🪙 Pièces${allowPack?" & rouleaux":""}</h2>${pieces.map(row).join("")}</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:18px;font-weight:800"><span>Total compté</span><span id="caisseTotal">0,00 €</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:8px"><span>Solde calculé (opérations)</span><span id="caisseExpected" data-exp="${expected}">${eur(expected)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-top:3px"><span class="muted">Écart (fond de caisse)</span><span id="caisseEcart" style="font-weight:800">—</span></div>
    <button class="btn" style="margin-top:14px" onclick="saveCaisse()">✅ Caler le solde de « ${a.name} » sur le compté</button>
    <button class="btn ghost" onclick="nextRecount()" style="margin-top:8px">← ${(UI.recountQueue&&UI.recountQueue.length)?"Compte suivant":"Retour"}</button>
    <div class="muted" style="font-size:11.5px;margin-top:10px">L'écart compare ton comptage physique au solde calculé d'après tes opérations. « Caler » ajuste le solde sur le réel compté.</div>
  </div>
  <div class="card"><h2>🗓️ Historique des comptages — ${a.name}</h2>${histHTML}</div>`;
}
function recalcCaisse(){ const inputs=[...document.querySelectorAll('#main input[data-amt]')]; if(!inputs.length)return 0;
  let total=0; const byKey={};
  inputs.forEach(inp=>{const amt=parseFloat(inp.dataset.amt)||0,q=parseInt(inp.value)||0,sub=amt*q; total+=sub; byKey[inp.dataset.key]=(byKey[inp.dataset.key]||0)+sub;});
  Object.keys(byKey).forEach(k=>{const st=document.getElementById('st_'+k); if(st) st.textContent= byKey[k]? eur(byKey[k]):'—';});
  total=Math.round(total*100)/100;
  const el=document.getElementById('caisseTotal'); if(el) el.textContent=eur(total);
  const ex=document.getElementById('caisseExpected'), ec=document.getElementById('caisseEcart');
  if(ex&&ec){ const exp=parseFloat(ex.dataset.exp)||0, d=Math.round((total-exp)*100)/100;
    ec.textContent=(d>0?"+":"")+eur(d); ec.style.color= Math.abs(d)<0.005?"var(--pos)":"var(--warn)"; }
  return total; }
function saveCaisse(){
  const a=acct(UI.compteAcc); if(!a)return;
  const inputs=[...document.querySelectorAll('#main input[data-amt]')]; const cash={}; let total=0;
  inputs.forEach(inp=>{const amt=parseFloat(inp.dataset.amt)||0,q=parseInt(inp.value)||0,key=inp.dataset.key,kind=inp.dataset.kind;
    total+=amt*q; if(q>0){ cash[key]=cash[key]||{}; cash[key][kind]=q; }});
  a.cash=cash; total=Math.round(total*100)/100;
  const b=computeBalances(); const ecart=Math.round((total-(b[a.id]||0))*100)/100;
  a.opening=(a.opening||0)+ecart;
  DB.cashCounts=DB.cashCounts||[]; DB.cashCounts.push({id:uid(),date:todayISO(),acct:a.id,total,ecart});
  UI.recountActive=false;
  save(); toast("« "+a.name+" » : "+eur(total)+(Math.abs(ecart)>=0.005?" (écart "+(ecart>0?"+":"")+eur(ecart)+")":""));
  if(UI.recountQueue&&UI.recountQueue.length) nextRecount(); else go("dash");
}

/* ===================== BUDGET (simple : à dépenser + enveloppes €/mois & €/an) ===================== */
/* Ce que tu peux DÉPENSER = compte courant + portefeuille. Caisse & Livret A = épargne (pas ici). */
function dispoReel(){ const b=computeBalances(); return Math.round((Math.max(0,b.cc||0)+Math.max(0,b.portefeuille||0))*100)/100; }
function aDepenser(){ return DB.aDepenser||0; }
function setADepenser(v){ DB.aDepenser=Math.max(0,parseFloat(String(v).replace(",","."))||0); save(); render(); }
/* plafond mensuel d'une catégorie = part mensuelle + provision des annuels (€/an ÷ 12) */
function catPlafond(c){ return Math.round(((+c.budget||0)+(+c.budgetAn||0)/12)*100)/100; }
function aDepenserCardHTML(totPlaf){
  const dep=aDepenser(), dispo=dispoReel(), reste=Math.round((dep-totPlaf)*100)/100, ok=totPlaf<=dep, pct=dep?Math.min(totPlaf/dep*100,100):0;
  return `<div class="card"><h2>💶 Ce que j'ai à dépenser ce mois-ci</h2>
    <div class="muted" style="font-size:12.5px;margin-bottom:10px">Écris l'argent que tu peux dépenser ce mois-ci (ton <b>compte courant + portefeuille</b>). L'app vérifie juste que tes enveloppes rentrent dedans. Ta <b>caisse</b> et ton <b>Livret A</b>, c'est de l'épargne — ça ne compte pas ici.</div>
    <div class="field" style="margin:0"><label>J'ai à dépenser (€)</label><input type="number" inputmode="decimal" step="0.01" placeholder="0,00" value="${dep||""}" onchange="setADepenser(this.value)"></div>
    ${dispo>0&&Math.round(dispo)!==Math.round(dep)?`<button class="btn ghost sm" style="width:auto;margin-top:8px" onclick="setADepenser(${dispo})">Utiliser mon solde réel (${eur0(dispo)})</button>`:""}
    ${dep>0&&totPlaf>0?`<div class="bbar" style="margin-top:12px">
      <div class="top"><span><b>Mes enveloppes</b></span><span style="color:${ok?'var(--pos)':'var(--neg)'}">${eur0(totPlaf)} <span class="muted">/ ${eur0(dep)}</span></span></div>
      <div class="track"><div class="fill" style="width:${pct}%;background:${ok?'var(--accent)':'var(--neg)'}"></div></div>
      <div class="muted" style="font-size:12.5px;margin-top:4px">${ok?`✅ Ça rentre — il te reste <b class="pos">${eur0(reste)}</b> non dépensé (ton épargne possible).`:`🔴 Tes enveloppes dépassent de <b class="neg">${eur0(-reste)}</b> ce que tu as à dépenser — baisse quelques limites.`}</div>
    </div>`:""}
  </div>`;
}
function viewBudget(){
  const m=UI.month==="all"?new Date().getMonth():UI.month;
  const tx=txOfMonth(m).filter(isDepense);
  const spentM={}; tx.forEach(t=>{const c=t.categorie||"Autres"; spentM[c]=(spentM[c]||0)+Math.abs(t.montant);});
  /* dépenses sur 12 mois glissants (pour les catégories qui ont une part annuelle) */
  const d=new Date(); d.setFullYear(d.getFullYear()-1);
  const cut=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const spent12={}; DB.transactions.filter(isDepense).forEach(t=>{ if((t.date||"")<cut)return; const c=t.categorie||"Autres"; spent12[c]=(spent12[c]||0)+Math.abs(t.montant); });
  const cats=DB.categories.map((c,i)=>{ const an=(+c.budgetAn||0)>0, plaf=catPlafond(c);
    const budRef=an?((+c.budget||0)*12+(+c.budgetAn||0)):(+c.budget||0);
    const spRef=an?(spent12[c.name]||0):(spentM[c.name]||0);
    return {c,i,an,plaf,budRef,spRef,sMois:spentM[c.name]||0}; }).filter(x=>x.c.active);
  const totPlaf=cats.reduce((a,x)=>a+x.plaf,0);
  const inputs=x=>`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11.5px" class="muted">
      <span style="display:inline-flex;align-items:center;gap:3px">€/mois <input type="number" min="0" step="5" placeholder="0" value="${x.c.budget||""}" onchange="setCatBudget(${x.i},this.value)" style="width:60px;padding:4px 6px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--text);text-align:right"></span>
      <span style="display:inline-flex;align-items:center;gap:3px">€/an <input type="number" min="0" step="10" placeholder="0" value="${x.c.budgetAn||""}" onchange="setCatBudgetAn(${x.i},this.value)" style="width:60px;padding:4px 6px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--text);text-align:right"></span>
      ${x.an?`<span>= <b>${eur0(x.plaf)}</b>/mois à prévoir</span>`:""}
    </div>`;
  const row=x=>{ const has=x.plaf>0, r=has&&x.budRef?x.spRef/x.budRef:0, pct=Math.min(r*100,100), col=r>1?"var(--neg)":r>=.8?"var(--warn)":"var(--pos)", reste=x.budRef-x.spRef;
    return `<div class="bbar"><div class="top"><span>${x.c.emoji} <b>${x.c.name}</b>${x.an?' <span class="tag" style="font-size:9.5px">sur 12 mois</span>':''}</span>
      <span style="color:${has?col:'var(--muted)'}">${has?`${eur0(x.spRef)} <span class="muted">/ ${eur0(x.budRef)}</span>`:`${eur0(x.sMois)} <span class="muted">dépensés</span>`}</span></div>
      ${has?`<div class="track"><div class="fill" style="width:${pct}%;background:${col}"></div></div>`:""}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px;flex-wrap:wrap;gap:6px">
        ${has?`<span class="muted" style="font-size:11.5px">${reste>=0?`reste <b class="pos">${eur0(reste)}</b>`:`dépassé de <b class="neg">${eur0(-reste)}</b>`}</span>`:`<span class="muted" style="font-size:11.5px">pas encore de limite</span>`}
        ${inputs(x)}
      </div></div>`;};
  return `<div class="pagehead">🎯 Mes enveloppes</div>${monthSelector()}
  ${aDepenserCardHTML(totPlaf)}
  <div class="card"><h2>Mes enveloppes — ${MONTHS[m]}</h2>
    <div class="muted" style="font-size:12px;margin-bottom:10px">Mets une limite par catégorie : ce que tu dépenses <b>par mois</b>, et s'il y a des choses <b>par an</b> (abonnements…), l'app ajoute leur part mensuelle. La barre se remplit avec tes dépenses réelles. <button class="btn ghost sm" style="display:inline;width:auto;padding:3px 8px" onclick="proposerPlafonds()">💡 propose-moi des montants</button></div>
    ${cats.map(row).join("")}</div>
  ${epargneCardHTML(m)}`;
}
function setCatBudget(i,v){ const c=DB.categories[i]; if(!c)return; c.budget=Math.max(0,parseFloat(String(v).replace(",","."))||0); save(); render(); }
function setCatBudgetAn(i,v){ const c=DB.categories[i]; if(!c)return; c.budgetAn=Math.max(0,parseFloat(String(v).replace(",","."))||0); save(); render(); }
/* proposition : limite €/mois = moyenne dépensée par catégorie (celles sans limite) */
function proposerPlafonds(){
  const n=Math.max(1,monthsWithDep().length); const per={};
  DB.transactions.filter(isDepense).forEach(t=>{ const c=t.categorie||""; if(c) per[c]=(per[c]||0)+Math.abs(t.montant); });
  let done=0;
  activeCats().forEach(c=>{ if(catPlafond(c)>0) return; const amt=Math.round((per[c.name]||0)/n); if(amt>0){ c.budget=amt; done++; } });
  if(!done){ toast("Pas encore assez d'historique — mets tes limites à la main"); return; }
  save(); render(); toast(done+" limite(s) proposée(s) d'après tes dépenses moyennes 💡");
}

/* ===================== OBJECTIFS D'ÉPARGNE (par compte : cible + suivi réel) ===================== */
function payeAmt(l){ return +l.val||0; }
/* combien est réellement arrivé sur un compte ce mois-ci (virements entrants − sortants) */
function misVersCompte(acctId,m){ if(!acctId) return 0; let v=0;
  txOfMonth(m).forEach(t=>{
    if(t.type==="transfer"){ if(t.to===acctId) v+=Math.abs(t.montant); if(t.from===acctId) v-=Math.abs(t.montant); }
    else if(isSavingsTransfer(t)){ if(savingsAccountOf(t)===acctId) v+=-t.montant; }
  });
  return Math.round(v*100)/100; }
function epargneCardHTML(m){
  const lignes=DB.paye.lines;
  const totCible=lignes.reduce((a,l)=>a+(l.acct?payeAmt(l):0),0);
  const totFait=lignes.reduce((a,l)=>a+(l.acct?Math.max(0,misVersCompte(l.acct,m)):0),0);
  const rows=lignes.map(l=>{ const cible=payeAmt(l), fait=l.acct?Math.max(0,misVersCompte(l.acct,m)):0;
    const r=cible?fait/cible:0, atteint=cible>0&&fait>=cible-0.005, col=atteint?'var(--pos)':'var(--accent)', reste=Math.max(0,cible-fait);
    return `<div class="setrow" style="flex-wrap:wrap;align-items:center">
      <select style="flex:1.4;min-width:150px" onchange="payeSet('${l.id}','acct',this.value)">
        <option value="">— Choisir un compte —</option>
        ${DB.accounts.filter(a=>a.active&&a.id!=="cc").map(a=>`<option value="${a.id}" ${l.acct===a.id?"selected":""}>${a.emoji} ${a.name}</option>`).join("")}
      </select>
      <span class="muted" style="font-size:11px">objectif</span>
      <input class="mini" type="number" min="0" step="1" value="${l.val||""}" onchange="payeSet('${l.id}','val',this.value)">
      <b style="min-width:56px;text-align:right">${eur0(cible)}</b>
      ${l.acct?`<button class="btn ghost sm" style="width:auto;padding:6px 10px" title="Préparer le virement du reste" onclick="payeTransfer('${l.id}')">⇄</button>`:""}
      <button class="del" onclick="payeDel('${l.id}')">🗑️</button>
      ${l.acct&&cible>0?`<div style="flex-basis:100%;margin-top:2px">
        <div class="track" style="height:6px"><div class="fill" style="width:${Math.min(r*100,100)}%;background:${col}"></div></div>
        <div class="muted" style="font-size:11px;margin-top:2px">${atteint?`✅ Objectif atteint — <b>${eur0(fait)}</b> mis ce mois-ci${fait>cible+0.005?` (dont ${eur0(fait-cible)} en plus 🎉)`:""}`:`déjà mis : <b>${eur0(fait)}</b> · reste <b>${eur0(reste)}</b> pour atteindre ton objectif`}</div>
      </div>`:""}
    </div>`;}).join("");
  return `<div class="card"><h2>🎯 Mes objectifs d'épargne du mois</h2>
    <div class="muted" style="font-size:12.5px;margin-bottom:10px">Fixe une cible par compte (Livret A, caisse, Swissborg…). Ce sont des <b>objectifs souples</b> : t'en approcher c'est déjà bien, faire moins un mois n'est pas grave. Le <b>⇄</b> prépare le virement du reste.</div>
    ${rows||'<div class="muted" style="font-size:12.5px">Aucun objectif d\'épargne pour l\'instant.</div>'}
    ${totCible>0?`<div class="bbar" style="margin-top:12px">
      <div class="top"><span><b>Total mis de côté</b></span><span style="color:${totFait>=totCible-0.005?'var(--pos)':'var(--accent)'}">${eur0(totFait)} <span class="muted">/ ${eur0(totCible)} visés</span></span></div>
      <div class="track"><div class="fill" style="width:${totCible?Math.min(totFait/totCible*100,100):0}%;background:${totFait>=totCible-0.005?'var(--pos)':'var(--accent)'}"></div></div>
    </div>`:""}
    <button class="btn ghost sm" style="width:auto;margin-top:10px" onclick="payeAddLine()">➕ Ajouter un objectif d'épargne</button>
  </div>`;
}
function setPaye(v){ DB.paye.montant=Math.max(0,parseFloat(String(v).replace(",","."))||0); save(); render(); }
function payeAddLine(){ DB.paye.lines.push({id:uid(),acct:"",mode:"eur",val:0}); save(); render(); }
function payeSet(id,f,v){ const l=DB.paye.lines.find(x=>x.id===id); if(!l)return;
  if(f==="val") l.val=Math.max(0,parseFloat(String(v).replace(",","."))||0);
  else l[f]=v; save(); render(); }
function payeDel(id){ DB.paye.lines=DB.paye.lines.filter(x=>x.id!==id); save(); render(); }
function payeTransfer(id){ const l=DB.paye.lines.find(x=>x.id===id); if(!l||!l.acct)return;
  const m=UI.month==="all"?new Date().getMonth():UI.month;
  const cible=Math.round(payeAmt(l)*100)/100, fait=Math.max(0,misVersCompte(l.acct,m));
  let amt=Math.round((cible-fait)*100)/100; if(amt<=0) amt=cible;
  if(!amt){ toast("Indique un objectif pour cette ligne"); return; }
  const a=acct(l.acct);
  UI.edit={type:"transfer",date:todayISO(),montant:amt,from:"cc",to:l.acct,note:"Épargne du mois"+(a?" — "+a.name:"")};
  UI.type="tr"; UI.tab="saisie"; renderNav(); render(); window.scrollTo(0,0); }

/* ===================== OBJECTIFS D'ÉPARGNE ===================== */
function monthsUntil(iso){ if(!iso)return null; const now=new Date(); now.setHours(0,0,0,0); const p=iso.split("-").map(Number); const d=new Date(p[0],p[1]-1,p[2]); return (d-now)/(86400000*30.44); }

  const e=UI.objEdit||{}; const editing=!!(UI.objEdit&&UI.objEdit.id);

    const moisR=mu!=null?Math.max(1,Math.ceil(mu)):null; const perMonth=(reste>0&&moisR)?reste/moisR:0;

      <div class="track" style="height:12px"><div class="fill" style="width:${pct}%;background:${col}"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:12.5px">
        <span>${atteint?'<b class="pos">🎉 Objectif atteint !</b>':`reste <b>${eur0(reste)}</b> (${Math.round(pct)}%)`}</span>
        ${o.echeance?`<span class="muted">${enRetard?'<b class="neg">échéance dépassée</b>':`d'ici ${frDate(o.echeance)}`}</span>`:''}</div>
      ${!atteint&&perMonth>0?`<div class="muted" style="font-size:12px;margin-top:6px">💡 Mets <b>${eur0(perMonth)}/mois</b> de côté pour y arriver${moisR?` (${moisR} mois)`:''}.</div>`:''}
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="btn ghost sm" onclick="objAdd('${o.id}')">＋ Versement</button>

        <button class="btn ghost sm" onclick="delObjectif('${o.id}')">🗑️</button></div></div>`;}).join("");
  return `<div class="pagehead">🎯 Mes objectifs d'épargne</div>

    <div class="row2"><div class="field"><label>Montant à atteindre (€)</label><input id="oCible" type="number" min="0" step="50" value="${e.cible||''}"></div>
      <div class="field"><label>Déjà épargné (€)</label><input id="oActuel" type="number" min="0" step="10" value="${e.actuel||0}"></div></div>

function saveObjectif(){ const nom=document.getElementById("oNom").value.trim(); const cible=parseFloat(document.getElementById("oCible").value)||0;
  if(!nom){toast("Donne un nom");return;} if(cible<=0){toast("Indique un montant à atteindre");return;}
  const eid=(UI.objEdit&&UI.objEdit.id)?UI.objEdit.id:null;
  const obj={id:eid||uid(),nom,emoji:document.getElementById("oEmoji").value.trim()||"🎯",cible,actuel:parseFloat(document.getElementById("oActuel").value)||0,echeance:document.getElementById("oEcheance").value||"",createdAt:eid?(UI.objEdit.createdAt||todayISO()):todayISO()};
  if(eid){const i=DB.objectifs.findIndex(x=>x.id===eid); if(i>=0)DB.objectifs[i]=obj;} else DB.objectifs.push(obj);

function objAdd(id){ const o=(DB.objectifs||[]).find(x=>x.id===id); if(!o)return; const v=prompt("Montant à ajouter à « "+o.nom+" » (€) :",""); if(v==null)return; const n=parseFloat(String(v).replace(",",".")); if(isNaN(n)){toast("Montant invalide");return;} o.actuel=Math.max(0,(o.actuel||0)+n); save(); toast(eur0(n)+" ajoutés"); render(); }
function objEdit(id){ UI.objEdit=(DB.objectifs||[]).find(x=>x.id===id); render(); window.scrollTo(0,0); }
function delObjectif(id){ const o=(DB.objectifs||[]).find(x=>x.id===id); if(!o)return; if(!confirm("Supprimer l'objectif « "+o.nom+" » ?"))return; DB.objectifs=DB.objectifs.filter(x=>x.id!==id); save(); render(); }

/* ===================== ASSISTANT IA ===================== */
function fluxBar(fl){
  const denom=Math.max(fl.rev, fl.dep+fl.epargne+Math.max(fl.dispo,0), 1);
  const w=x=>Math.max(0,x)/denom*100;
  return `<div style="display:flex;height:16px;border-radius:8px;overflow:hidden;background:var(--surface-2);margin:12px 0">
    <div style="width:${w(fl.dep)}%;background:var(--neg)"></div>
    <div style="width:${w(fl.epargne)}%;background:var(--info)"></div>
    <div style="width:${w(Math.max(fl.dispo,0))}%;background:var(--pos)"></div></div>`;
}
function fluxRow(lbl,val,col,strong){ return `<div style="display:flex;justify-content:space-between;padding:5px 0;${strong?'border-top:1px solid var(--line);margin-top:4px;font-weight:800':''}">
  <span style="${strong?'':'color:var(--muted)'}">${lbl}</span><span style="color:${col}">${val}</span></div>`; }

  const vsB=f.totalBudget>0?(f.projMonth>f.totalBudget?` — soit <b class="neg">${eur0(f.projMonth-f.totalBudget)} au-dessus</b> du budget (${eur0(f.totalBudget)}).`:` — dans le budget de ${eur0(f.totalBudget)} ✅.`):".";
  return `<div class="pagehead">🤖 Assistant</div>${monthSelector()}

    <div class="legend" style="margin:0 0 8px">
      <span class="li"><span class="dot" style="background:var(--neg)"></span>Dépenses</span>
      <span class="li"><span class="dot" style="background:var(--info)"></span>Mis de côté</span>
