/* ===================== HORAIRES ===================== */
const JOURS=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
function toMin(hhmm){ if(!hhmm||hhmm.indexOf(":")<0)return null; const p=hhmm.split(":"); return (+p[0])*60+(+p[1]); }
function hoursOf(e){ const a=toMin(e.debut),b0=toMin(e.fin); if(a==null||b0==null)return 0; let b=b0; if(b<a)b+=1440; const mins=b-a-(parseInt(e.pause)||0); return Math.max(0,mins)/60; }
function fmtH(h){ const s=h<0?"−":""; h=Math.abs(h); const H=Math.floor(h+1e-6),M=Math.round((h-H)*60); return s+H+"h"+String(M).padStart(2,"0"); }
function jourNom(iso){ const p=iso.split("-").map(Number); return JOURS[new Date(p[0],p[1]-1,p[2]).getDay()]; }
function weekKey(iso){ const p=iso.split("-").map(Number); const d=new Date(p[0],p[1]-1,p[2]); const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function prevuJour(){ return DB.heuresPrevuesJour!=null?DB.heuresPrevuesJour:7; }
function contratHebdo(){ return DB.contratHebdo!=null?DB.contratHebdo:42; }
/* heures contractuelles dues sur un mois donné (YYYY-MM) = 42h/sem × (nb jours du mois / 7) */
function daysInMonth(ym){ const p=ym.split("-").map(Number); return new Date(p[0],p[1],0).getDate(); }
function prevuMois(ym){ return contratHebdo()*daysInMonth(ym)/7; }
const MOISNOM=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
/* couleur d'une journée selon le nb d'heures (heatmap) */
function hColor(h){ if(h<=0)return "transparent"; if(h<4)return "var(--info)"; if(h<7)return "#0ea5e9"; if(h<9)return "var(--pos)"; if(h<11)return "var(--warn)"; return "var(--neg)"; }
/* vacances : une période = {id, du, au, note} (dates ISO incluses) */
function vacOf(iso){ return (DB.vacances||[]).find(v=>v.du<=iso&&iso<=v.au); }
function vacDays(v){ const a=v.du.split("-").map(Number),b=v.au.split("-").map(Number);
  return Math.round((new Date(b[0],b[1]-1,b[2])-new Date(a[0],a[1]-1,a[2]))/864e5)+1; }
/* nb de jours d'une période tombant dans une année donnée */
function vacDaysInYear(v,year){ const y0=year+"-01-01",y1=year+"-12-31"; const du=v.du>y0?v.du:y0, au=v.au<y1?v.au:y1;
  return du>au?0:vacDays({du,au}); }
function viewHoraires(){
  const e=UI.horEdit||{}; const prevu=prevuJour(), contrat=contratHebdo();
  const list=(DB.horaires||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const wk=weekKey(todayISO()), ym=todayISO().slice(0,7);
  let weekTot=0,monthTot=0,cum=0;
  list.forEach(x=>{const h=hoursOf(x); if(weekKey(x.date)===wk)weekTot+=h; if((x.date||"").slice(0,7)===ym)monthTot+=h; cum+=(h-prevu);});
  const editing=!!(UI.horEdit&&UI.horEdit.id);
  const showPause=UI.horPause||(e.pause>0);

  /* ---------- PLANNING : SEMAINIER (heures de début / fin par jour) ---------- */
  const planWk=UI.planWeek||weekKey(todayISO());
  const wp0=planWk.split("-").map(Number); const monday=new Date(wp0[0],wp0[1]-1,wp0[2]);
  const entByDate={}; list.forEach(x=>{ (entByDate[x.date]=entByDate[x.date]||[]).push(x); });
  let dayRows="";
  for(let i=0;i<7;i++){ const d=new Date(monday); d.setDate(monday.getDate()+i);
    const iso=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const ents=(entByDate[iso]||[]).slice().sort((a,b)=>(a.debut||"").localeCompare(b.debut||""));
    const isToday=iso===todayISO(); const worked=ents.length>0; const vac=vacOf(iso);
    const horaires = worked ? ents.map(x=>`${x.debut} – ${x.fin}`).join('<br>')
      : vac ? '<span style="color:var(--warn);font-weight:700">🏖️ vacances</span>'
      : '<span style="color:var(--muted)">repos</span>';
    dayRows+=`<div onclick="planAdd('${iso}')" title="Cliquer pour saisir" style="cursor:pointer;display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:11px;margin-bottom:6px;background:var(--surface-2);border:1px solid var(--line);${isToday?'box-shadow:0 0 0 2px var(--accent)':''}">
      <span style="width:6px;align-self:stretch;border-radius:4px;background:${worked?'var(--accent)':vac?'var(--warn)':'var(--line)'};flex:none"></span>
      <div style="flex:1"><div style="font-weight:700;text-transform:capitalize">${jourNom(iso)} ${d.getDate()}/${String(d.getMonth()+1).padStart(2,"0")}${ents.some(x=>x.remplacement)?' 🔁':''}</div>${isToday?'<div style="font-size:10.5px;color:var(--accent);font-weight:700">aujourd\'hui</div>':''}</div>
      <div style="font-weight:800;font-size:14px;text-align:right;color:${worked?'var(--text)':'var(--muted)'};line-height:1.35">${horaires}</div></div>`;
  }
  const last=new Date(monday); last.setDate(monday.getDate()+6);
  const planNav=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <button class="del" onclick="planMove(-1)" style="font-size:18px">‹</button>
    <b style="flex:1;text-align:center">Semaine du ${monday.getDate()}/${String(monday.getMonth()+1).padStart(2,"0")} au ${last.getDate()}/${String(last.getMonth()+1).padStart(2,"0")}</b>
    <button class="del" onclick="planMove(1)" style="font-size:18px">›</button></div>`;
  const planningHTML=`<div class="card"><h2>🗓️ Mon semainier</h2>
    ${planNav}
    ${dayRows}
    <div class="muted" style="font-size:11px;margin-top:10px">Le détail et le total des heures sont calculés plus bas, dans les tableaux par semaine.</div>
  </div>`;

  /* ---------- TABLEAU RÉCAP PAR MOIS (vs contrat 42h/sem) ---------- */
  const months={}; list.forEach(x=>{const m=(x.date||"").slice(0,7); if(m)months[m]=(months[m]||0)+hoursOf(x);});
  const mkeys=Object.keys(months).sort((a,b)=>b.localeCompare(a));
  const moisRows=mkeys.map(m=>{const tot=months[m],du=prevuMois(m),diff=tot-du,mp=m.split("-");
    return `<tr style="border-bottom:1px solid var(--line)">
      <td style="padding:9px 4px;text-transform:capitalize;font-weight:700">${MOISNOM[+mp[1]-1]} ${mp[0]}</td>
      <td style="padding:9px 4px;text-align:right;font-weight:800">${fmtH(tot)}</td>
      <td style="padding:9px 4px;text-align:right;color:var(--muted)">${fmtH(du)}</td>
      <td style="padding:9px 4px;text-align:right;font-weight:700;color:${diff>=0?'var(--pos)':'var(--neg)'}">${diff>=0?'+':''}${fmtH(diff)}</td></tr>`;}).join("");
  const tableauHTML=`<div class="card"><h2>📊 Récap par mois <span class="tag">contrat ${contrat}h/sem</span></h2>
    ${mkeys.length?`<table style="width:100%;border-collapse:collapse;font-size:13.5px">
      <tr style="border-bottom:2px solid var(--line)"><th style="text-align:left;padding:6px 4px;font-size:11px;color:var(--muted)">Mois</th>
      <th style="text-align:right;padding:6px 4px;font-size:11px;color:var(--muted)">Effectué</th>
      <th style="text-align:right;padding:6px 4px;font-size:11px;color:var(--muted)">Dû</th>
      <th style="text-align:right;padding:6px 4px;font-size:11px;color:var(--muted)">Écart</th></tr>
      ${moisRows}</table>
      <div class="muted" style="font-size:11.5px;margin-top:9px">« Dû » = ${contrat}h/sem × (nb de jours du mois ÷ 7). Modifiable ci-dessous.</div>`
      :`<div class="empty">Saisis des journées pour voir ton récap mensuel.</div>`}
  </div>`;

  /* ---------- REMPLACEMENTS (heures en plus) ---------- */
  const rempls=list.filter(x=>x.remplacement);
  const remplTot=rempls.reduce((s,x)=>s+hoursOf(x),0);
  const remplPlus=rempls.reduce((s,x)=>s+Math.max(0,hoursOf(x)-prevu),0);
  const remplMois=rempls.filter(x=>(x.date||"").slice(0,7)===ym).reduce((s,x)=>s+hoursOf(x),0);
  const remplRows=rempls.slice(0,12).map(x=>{const h=hoursOf(x),plus=Math.max(0,h-prevu);
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid var(--line)">
      <span style="font-size:16px">🔁</span>
      <div style="flex:1"><div style="font-weight:700;text-transform:capitalize">${jourNom(x.date)} ${frDate(x.date)}</div>
        <div class="muted" style="font-size:11.5px">${x.debut}–${x.fin}${x.note?' · '+x.note:''}</div></div>
      <div style="text-align:right"><div style="font-weight:800">${fmtH(h)}</div>${plus>0?`<div style="font-size:11px;color:var(--pos)">+${fmtH(plus)} en plus</div>`:''}</div></div>`;}).join("");
  const remplHTML=rempls.length?`<div class="card"><h2>🔁 Remplacements <span style="margin-left:auto;font-size:13px">${fmtH(remplTot)}${remplPlus>0?` · <span style="color:var(--pos)">+${fmtH(remplPlus)} en plus</span>`:''}</span></h2>
    <div class="muted" style="font-size:12px;margin-bottom:10px">${rempls.length} journée${rempls.length>1?'s':''} de remplacement${remplMois>0?` · ${fmtH(remplMois)} ce mois-ci`:''}. « En plus » = heures au-delà de ta référence de ${fmtH(prevu)}/jour.</div>
    ${remplRows}${rempls.length>12?`<div class="muted" style="font-size:11px;margin-top:8px">… et ${rempls.length-12} autre${rempls.length-12>1?'s':''}.</div>`:''}</div>`:'';

  /* ---------- VACANCES (congés posés) ---------- */
  const ve=UI.vacEdit||{}; const vacEditing=!!(UI.vacEdit&&UI.vacEdit.id);
  const vacs=(DB.vacances||[]).slice().sort((a,b)=>(b.du||"").localeCompare(a.du||""));
  const annee=+todayISO().slice(0,4);
  const poses=vacs.reduce((s,v)=>s+vacDaysInYear(v,annee),0);
  const quota=DB.congesAnnuels!=null?DB.congesAnnuels:0;
  const today=todayISO();
  const vacRows=vacs.map(v=>{const nb=vacDays(v); const encours=v.du<=today&&today<=v.au; const futur=v.du>today;
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid var(--line);${!encours&&!futur?'opacity:.6':''}">
      <span style="font-size:16px">🏖️</span>
      <div style="flex:1"><div style="font-weight:700">${v.du===v.au?`Le ${frDate(v.du)}`:`Du ${frDate(v.du)} au ${frDate(v.au)}`}
        ${encours?' <span class="tag" style="background:var(--warn);color:#fff;font-size:9.5px">en cours</span>':futur?' <span class="tag" style="background:var(--accent);color:#fff;font-size:9.5px">à venir</span>':''}</div>
        ${v.note?`<div class="muted" style="font-size:11.5px">${v.note}</div>`:''}</div>
      <div style="font-weight:800;white-space:nowrap">${nb} j</div>
      <button class="del" onclick="vacEdit('${v.id}')">✏️</button><button class="del" onclick="delVac('${v.id}')">🗑️</button></div>`;}).join("");
  const vacHTML=`<div class="card"><h2>🏖️ Vacances <span style="margin-left:auto;font-size:13px">${poses} j posé${poses>1?'s':''} en ${annee}${quota>0?` <span style="color:${quota-poses>=0?'var(--pos)':'var(--neg)'}">· reste ${quota-poses} j</span>`:''}</span></h2>
    <div class="row2"><div class="field"><label>Du</label><input id="vDu" type="date" value="${ve.du||todayISO()}"></div>
      <div class="field"><label>Au (inclus)</label><input id="vAu" type="date" value="${ve.au||todayISO()}"></div></div>
    <div class="field"><label>Note (facultatif)</label><input id="vNote" placeholder="Ex : été, Noël…" value="${(ve.note||'').replace(/"/g,'&quot;')}"></div>
    <button class="btn" onclick="saveVac()">${vacEditing?"💾 Enregistrer":"✅ Poser ces vacances"}</button>
    ${vacEditing?`<button class="btn ghost" onclick="UI.vacEdit=null;render()" style="margin-top:8px">Annuler</button>`:""}
    ${vacRows?`<div style="margin-top:14px">${vacRows}</div>`:`<div class="empty" style="margin-top:12px">Aucune période enregistrée.</div>`}
    <div class="field" style="margin-top:14px"><label>Droit aux congés (jours / an) <span class="muted" style="font-weight:400">— facultatif, pour voir ce qu'il te reste</span></label>
      <input type="number" min="0" step="0.5" value="${quota||''}" placeholder="Ex : 25" onchange="setConges(this.value)"></div>
  </div>`;

  /* ---------- DÉTAIL PAR SEMAINE ---------- */
  const byWeek={}; list.forEach(x=>{(byWeek[weekKey(x.date)]=byWeek[weekKey(x.date)]||[]).push(x);});
  const weeks=Object.keys(byWeek).sort((a,b)=>b.localeCompare(a)).slice(0,10);
  const weeksHTML=weeks.map(w=>{ const es=byWeek[w]; const tot=es.reduce((s,x)=>s+hoursOf(x),0); const diff=tot-contrat;
    const rows=es.sort((a,b)=>b.date.localeCompare(a.date)).map(x=>{const h=hoursOf(x),d=h-prevu;
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid var(--line)">
        <span style="width:9px;height:9px;border-radius:50%;background:${hColor(h)};flex:none"></span>
        <div style="flex:1"><div style="font-weight:700;text-transform:capitalize">${jourNom(x.date)} ${frDate(x.date)}${x.remplacement?' <span class="tag" style="background:var(--accent);color:#fff;font-size:9.5px">🔁 remplacement</span>':''}</div>
          <div class="muted" style="font-size:11.5px">${x.debut}–${x.fin}${x.pause?` · coupure ${x.pause} min`:''}${x.note?' · '+x.note:''}</div></div>
        <div style="text-align:right"><div style="font-weight:800">${fmtH(h)}</div><div style="font-size:11px;color:${d>=0?'var(--pos)':'var(--neg)'}">${d>=0?'+':''}${fmtH(d)}</div></div>
        <button class="del" onclick="horEdit('${x.id}')">✏️</button><button class="del" onclick="delHoraire('${x.id}')">🗑️</button></div>`;}).join("");
    const wp=w.split("-"); return `<div class="card"><h2>Semaine du ${wp[2]}/${wp[1]} <span style="margin-left:auto;font-size:13px">${fmtH(tot)} <span style="color:${diff>=0?'var(--pos)':'var(--neg)'};font-weight:700">(${diff>=0?'+':''}${fmtH(diff)})</span></span></h2>${rows}</div>`;
  }).join("");

  return `<div class="pagehead">🕐 Horaires</div>
  <div class="grid kpis" style="margin-bottom:16px">
    <div class="kpi"><div class="lbl">Cette semaine</div><div class="val">${fmtH(weekTot)}</div></div>
    <div class="kpi"><div class="lbl">Ce mois</div><div class="val">${fmtH(monthTot)}</div></div>
    <div class="kpi"><div class="lbl">Compteur +/−</div><div class="val ${cum>=0?'pos':'neg'}">${cum>=0?'+':''}${fmtH(cum)}</div></div>
  </div>
  ${planningHTML}
  <div class="card"><h2>${editing?"✏️ Modifier la journée":"➕ Ajouter une journée"}</h2>
    <div class="field"><label>Date</label><input id="hDate" type="date" value="${e.date||todayISO()}"></div>
    <div class="row2"><div class="field"><label>Début</label><input id="hDebut" type="time" value="${e.debut||'09:00'}"></div>
      <div class="field"><label>Fin</label><input id="hFin" type="time" value="${e.fin||'17:00'}"></div></div>
    ${showPause
      ? `<div class="field"><label>Coupure (min) <span class="muted" style="font-weight:400">— facultatif</span></label><input id="hPause" type="number" min="0" step="5" placeholder="0" value="${e.pause||''}"></div>`
      : `<input id="hPause" type="hidden" value="">
         <button class="btn ghost sm" onclick="UI.horPause=true;render()" style="margin-bottom:12px">➕ J'ai eu une coupure</button>`}
    <div class="field"><label>Note (facultatif)</label><input id="hNote" placeholder="Ex : formation, réunion…" value="${(e.note||'').replace(/"/g,'&quot;')}"></div>
    <label style="display:flex;align-items:center;gap:10px;margin:2px 0 14px;cursor:pointer;font-weight:600">
      <input id="hRempl" type="checkbox" ${e.remplacement?'checked':''} style="width:19px;height:19px;flex:none;accent-color:var(--accent)">
      <span>🔁 C'était un remplacement <span class="muted" style="font-weight:400;font-size:12px">(pour suivre tes heures en plus)</span></span></label>
    <button class="btn" onclick="saveHoraire()">${editing?"💾 Enregistrer":"✅ Ajouter"}</button>
    ${editing?`<button class="btn ghost" onclick="UI.horEdit=null;UI.horPause=false;render()" style="margin-top:8px">Annuler</button>`:""}
    <div class="row2" style="margin-top:14px;align-items:end">
      <div class="field" style="margin:0"><label>Contrat (h / semaine)</label><input type="number" min="0" step="0.5" value="${contrat}" onchange="setContrat(this.value)"></div>
      <div class="field" style="margin:0"><label>Référence +/− par jour</label><input type="number" min="0" step="0.5" value="${prevu}" onchange="setPrevu(this.value)"></div></div>
  </div>
  ${vacHTML}
  ${tableauHTML}
  ${remplHTML}
  ${weeksHTML||'<div class="card"><div class="empty">Aucune journée enregistrée. Ajoute-en une ci-dessus 👆</div></div>'}`;
}
function saveHoraire(){
  const date=document.getElementById("hDate").value, debut=document.getElementById("hDebut").value, fin=document.getElementById("hFin").value;
  if(!date||!debut||!fin){toast("Date, début et fin requis");return;}
  const eid=(UI.horEdit&&UI.horEdit.id)?UI.horEdit.id:null;
  const obj={id:eid||uid(),date,debut,fin,pause:parseInt(document.getElementById("hPause").value)||0,note:document.getElementById("hNote").value.trim(),remplacement:!!(document.getElementById("hRempl")&&document.getElementById("hRempl").checked)};
  if(eid){ const i=DB.horaires.findIndex(x=>x.id===eid); if(i>=0)DB.horaires[i]=obj; } else DB.horaires.push(obj);
  UI.horEdit=null; UI.horPause=false; save(); toast(fmtH(hoursOf(obj))+" enregistré ✅"); render();
}
function horEdit(id){ UI.horEdit=(DB.horaires||[]).find(x=>x.id===id); UI.horPause=!!(UI.horEdit&&UI.horEdit.pause>0); render(); window.scrollTo(0,0); }
function delHoraire(id){ if(!confirm("Supprimer cette journée ?"))return; DB.horaires=DB.horaires.filter(x=>x.id!==id); save(); render(); }
function setPrevu(v){ const n=parseFloat(String(v).replace(",",".")); if(isNaN(n))return; DB.heuresPrevuesJour=n; save(); render(); }
function saveVac(){
  let du=document.getElementById("vDu").value, au=document.getElementById("vAu").value;
  if(!du||!au){toast("Dates de début et de fin requises");return;}
  if(au<du){const t=du;du=au;au=t;}
  const eid=(UI.vacEdit&&UI.vacEdit.id)?UI.vacEdit.id:null;
  const obj={id:eid||uid(),du,au,note:document.getElementById("vNote").value.trim()};
  if(eid){ const i=DB.vacances.findIndex(x=>x.id===eid); if(i>=0)DB.vacances[i]=obj; } else DB.vacances.push(obj);
  UI.vacEdit=null; save(); toast(vacDays(obj)+" jour"+(vacDays(obj)>1?"s":"")+" de vacances enregistré"+(vacDays(obj)>1?"s":"")+" 🏖️"); render();
}
function vacEdit(id){ UI.vacEdit=(DB.vacances||[]).find(x=>x.id===id); render(); window.scrollTo(0,0); }
function delVac(id){ if(!confirm("Supprimer cette période de vacances ?"))return; DB.vacances=DB.vacances.filter(x=>x.id!==id); save(); render(); }
function setConges(v){ const n=parseFloat(String(v).replace(",",".")); DB.congesAnnuels=isNaN(n)?null:n; save(); render(); }
function setContrat(v){ const n=parseFloat(String(v).replace(",",".")); if(isNaN(n))return; DB.contratHebdo=n; save(); render(); }
/* semainier : navigation de semaine (±7j) + clic sur un jour pour le pré-saisir */
function planMove(d){ const base=UI.planWeek||weekKey(todayISO()); const p=base.split("-").map(Number); const dt=new Date(p[0],p[1]-1,p[2]+d*7); UI.planWeek=weekKey(dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0")); render(); }
function planAdd(iso){ UI.horEdit={date:iso}; UI.horPause=false; render(); window.scrollTo(0,0); }

    <select style="flex:1;min-width:110px" onchange="setLib(${i},'sub',this.value)">${subOptions(l.cat,l.sub)}</select>
    <button class="del" onclick="delLib(${i})">🗑️</button>

  return `<div class="pagehead">⚙️ Réglages</div>

    ${cats}
    <div class="row2" style="margin-top:14px"><div class="field" style="margin:0"><input id="ncEmoji" class="emoji" placeholder="🏷️" style="width:100%"></div>

    <div class="muted" style="font-size:12.5px;margin-bottom:10px">Ta liste de libellés favoris : ils te sont proposés en premier (⭐) quand tu saisis une opération, avec leur catégorie pré-remplie. L'app te propose aussi automatiquement tout ce que tu as déjà saisi.</div>

        : `<div class="muted" style="font-size:13px">Synchro cloud indisponible (pas de connexion Internet). L'app fonctionne en local.</div>` }
  </div>
  <div class="card"><h2>💾 Données</h2>

function setAcc(i,f,v){ const a=DB.accounts[i]; if(!a)return; a[f]= f==="opening"?(parseFloat(String(v).replace(",","."))||0): f==="active"?!!v: v; save(); if(f==="opening"||f==="active"||f==="emoji")render(); }
function calibAcc(i,val){ const v=parseFloat(String(val).replace(",",".")); if(isNaN(v))return; const a=DB.accounts[i]; if(!a)return; const b=computeBalances(); a.opening=(a.opening||0)+(v-(b[a.id]||0)); save(); render(); toast("« "+a.name+" » recalé sur "+eur0(v)); }
function addAcct(){ const id="acc"+Date.now().toString(36); DB.accounts.push({id,name:"Nouveau compte",emoji:"💳",type:"courant",opening:0,active:true}); save(); render(); }
function setCat(i,f,v){ const c=DB.categories[i]; if(!c)return;
  if(f==="name"){ const old=c.name; const nn=v.trim()||old; DB.transactions.forEach(t=>{if(t.categorie===old)t.categorie=nn;}); c.name=nn; }
  else c[f]= f==="active"?!!v:v; save(); if(f==="active"||f==="emoji")render(); }
function setCatSubs(i,v){ DB.categories[i].subs=v.split(",").map(s=>s.trim()).filter(Boolean); save(); }
function setCatBesoin(i,v){ if(DB.categories[i]){ DB.categories[i].besoin=!!v; save(); } }
function delCat(i){ if(!confirm("Supprimer la catégorie « "+DB.categories[i].name+" » ? (les opérations existantes gardent leur libellé)"))return; DB.categories.splice(i,1); save(); render(); }
function addCat(){ const n=document.getElementById("ncName").value.trim(); if(!n){toast("Donne un nom");return;}
  DB.categories.push({name:n,emoji:(document.getElementById("ncEmoji").value.trim()||"🏷️"),active:true,subs:[]}); save(); toast("Catégorie ajoutée"); render(); }
function setLib(i,f,v){ const l=DB.libelles[i]; if(!l)return;
  if(f==="txt"){ l.txt=v.trim()||l.txt; } else if(f==="cat"){ l.cat=v; l.sub=""; } else l[f]=v;
  save(); render(); }
function delLib(i){ DB.libelles.splice(i,1); save(); render(); }
function addLib(){ const el=document.getElementById("nlTxt"); const t=(el?el.value:"").trim(); if(!t){toast("Écris un libellé");return;}

/* ===================== IMPORT / EXPORT ===================== */
function exportCSV(){
  const head=["type","date","montant","categorie","sousCategorie","compte","from","to","moyen","note"];
  const rows=DB.transactions.map(t=>head.map(h=>{let v=t[h]; if(h==="date")v=frDate(t.date); if(h==="montant")v=String(t.montant).replace(".",","); v=(v==null?"":String(v)); return `"${v.replace(/"/g,'""')}"`;}).join(";"));
  const csv=head.join(";")+"\n"+rows.join("\n");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"}));
  a.download="mon-budget-"+todayISO()+".csv"; a.click(); toast("Export CSV téléchargé");
}
function importCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim()); if(!lines.length)return;
  const sep=lines[0].includes(";")?";":","; const head=splitCSV(lines[0],sep).map(h=>h.trim().toLowerCase());
  const find=arr=>{for(const a of arr){const i=head.indexOf(a);if(i>=0)return i;}return -1;};
  const iDate=find(["date","dates"]),iMont=find(["montant","montants","amount"]),iCat=find(["categorie","catégorie","cg"]),
    iSub=find(["souscategorie","sous-catégorie","scg"]),iMoy=find(["moyen","action","actions"]),iNote=find(["note","libellé","libelle","spécifications","specifications","description"]),
    iCompte=find(["compte"]),iType=find(["type"]),iFrom=find(["from","de"]),iTo=find(["to","vers"]);
  let n=0;
  for(let k=1;k<lines.length;k++){ const c=splitCSV(lines[k],sep); if(!c.length)continue;
    const raw=(c[iMont]||"").replace(/\s|€| /g,"").replace(",","."); let mont=parseFloat(raw.replace(/[^0-9.\-]/g,"")); if((c[iMont]||"").includes("("))mont=-Math.abs(mont);
    if(isNaN(mont))continue;
    const type=(iType>=0?c[iType]:"")||"";
    if(type==="transfer") DB.transactions.push({id:uid(),type:"transfer",date:toISO((c[iDate]||"").trim()),montant:Math.abs(mont),from:(c[iFrom]||"").trim(),to:(c[iTo]||"").trim(),note:(c[iNote]||"").trim()});
    else DB.transactions.push({id:uid(),date:toISO((c[iDate]||"").trim()),montant:mont,categorie:(c[iCat]||"").trim(),sousCategorie:(c[iSub]||"").trim(),compte:(iCompte>=0?c[iCompte]:"").trim(),moyen:(c[iMoy]||"").trim(),note:(c[iNote]||"").trim(),periode:""});
    n++;
  }
  save(); toast(n+" opérations importées ✅"); render();
}
function splitCSV(line,sep){const out=[];let cur="",q=false;for(let i=0;i<line.length;i++){const ch=line[i];
  if(q){if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}else{if(ch==='"')q=true;else if(ch===sep){out.push(cur);cur="";}else cur+=ch;}}out.push(cur);return out;}

function effectiveDark(){ const t=STORE.get("theme"); if(t==="dark")return true; if(t==="light")return false;
  return !!(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches); }
function applyTheme(){ const t=STORE.get("theme");
  if(t==="light"||t==="dark") document.documentElement.setAttribute("data-theme",t); else document.documentElement.removeAttribute("data-theme");
  const b=document.getElementById("btnTheme"); if(b){ const d=effectiveDark(); b.textContent=d?"☀️":"🌙"; b.title=d?"Passer en mode jour":"Passer en mode nuit"; } }
function toggleTheme(){ STORE.set("theme", effectiveDark()?"light":"dark"); applyTheme(); }

  }
}
